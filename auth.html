<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1BOX — Get Auth Code</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c10; color: #e8eaf0; font-family: 'JetBrains Mono', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .card { background: #14181f; border: 1px solid #252d3d; border-radius: 12px; padding: 40px; max-width: 700px; width: 100%; }
  h1 { font-size: 1.3rem; color: #22c55e; margin-bottom: 8px; letter-spacing: 0.05em; }
  .sub { color: #6b7a99; font-size: 0.75rem; margin-bottom: 32px; }
  .step { background: #1a1f2b; border: 1px solid #252d3d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .step-label { font-size: 0.65rem; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .step-text { font-size: 0.8rem; line-height: 1.6; }
  button { background: #22c55e; color: #000; border: none; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.85rem; padding: 14px 28px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  .code-box { background: #0a0c10; border: 1px solid #22c55e; border-radius: 8px; padding: 16px; margin-top: 16px; word-break: break-all; font-size: 0.7rem; color: #22c55e; max-height: 200px; overflow-y: auto; display: none; }
  .code-box.visible { display: block; }
  .copy-btn { background: #252d3d; color: #e8eaf0; font-size: 0.7rem; padding: 6px 14px; width: auto; margin-top: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>1BOX DASHBOARD — AUTH CODE</h1>
  <p class="sub">Get an authorization code to exchange for a refresh token</p>
  <div class="step">
    <div class="step-label">Step 1</div>
    <div class="step-text">Click below. Sign in with your Volta Global account. After consent, you'll be redirected back here.</div>
    <button id="auth-btn" onclick="startAuth()">Sign in with Microsoft</button>
  </div>
  <div class="step">
    <div class="step-label">Step 2</div>
    <div class="step-text">After login, your authorization code will appear below. Copy it and paste it into the Claude chat.</div>
    <div id="code-box" class="code-box"></div>
    <button id="copy-btn" class="copy-btn" onclick="copyCode()" style="display:none">Copy Authorization Code</button>
  </div>
</div>
<script>
const CLIENT_ID = '08413fef-411e-495a-91f6-a35384e91c70';
const TENANT_ID = 'd3203b0e-c1dd-4a86-af87-1f4de9256288';
const REDIRECT_URI = window.location.href.split('?')[0].split('#')[0];
const SCOPE = 'offline_access Files.Read User.Read';
function startAuth() {
  const authUrl = 'https://login.microsoftonline.com/' + TENANT_ID + '/oauth2/v2.0/authorize' +
    '?client_id=' + encodeURIComponent(CLIENT_ID) +
    '&response_type=code' +
    '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
    '&scope=' + encodeURIComponent(SCOPE) +
    '&response_mode=query' +
    '&prompt=consent';
  window.location.href = authUrl;
}
function copyCode() {
  if (window._authCode) {
    navigator.clipboard.writeText(window._authCode).then(function() {
      document.getElementById('copy-btn').textContent = 'Copied!';
      setTimeout(function() {
        document.getElementById('copy-btn').textContent = 'Copy Authorization Code';
      }, 2000);
    });
  }
}
var urlParams = new URLSearchParams(window.location.search);
var code = urlParams.get('code');
if (code) {
  window._authCode = code;
  var codeBox = document.getElementById('code-box');
  codeBox.textContent = code;
  codeBox.classList.add('visible');
  document.getElementById('copy-btn').style.display = 'inline-block';
  document.getElementById('auth-btn').style.display = 'none';
}
</script>
</body>
</html>
