<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1BOX Portfolio Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f0f1f2;
    --surface: #ffffff;
    --surface-alt: #fafafa;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --text: #1a1a1a;
    --text-secondary: #4b5563;
    --muted: #9ca3af;
    --muted-2: #6b7280;
    --green: #10b981;
    --green-bar: #16a34a;
    --red: #ef4444;
    --amber: #f97316;
    --amber-2: #f59e0b;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --dark: #0a0a0a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .num, .data-table .num, .kpi-value, .ms-val { font-variant-numeric: tabular-nums; }

  /* ── CONFIG MODAL ── */
  #config-modal {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(15,15,15,0.6);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
  }
  #config-modal.hidden { display: none; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
    width: 500px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .modal-box .subtitle {
    color: var(--muted-2);
    font-size: 12px;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .field-group { margin-bottom: 16px; }
  .field-group label {
    display: block;
    font-size: 11px;
    color: var(--muted-2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field-group input {
    width: 100%;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Inter', monospace;
    font-size: 12px;
    outline: none;
  }
  .field-group input:focus { border-color: var(--dark); }
  .field-group .hint { color: var(--muted); font-size: 11px; margin-top: 5px; }

  .btn-primary {
    width: 100%;
    background: var(--dark);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary {
    width: 100%;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn-secondary:hover { border-color: var(--dark); }

  /* ── MAIN LAYOUT ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  #app.visible { display: flex; }

  header {
    background: var(--dark);
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    display: flex; align-items: center; gap: 8px;
  }
  .logo img {
    height: 48px;
    width: auto;
    display: block;
  }
  .header-right {
    display: flex; align-items: center; gap: 12px;
  }
  #last-updated {
    color: rgba(255,255,255,0.6);
    font-size: 11px;
  }
  .btn-refresh {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 4px 10px;
    color: #fff;
    font-size: 11px;
    cursor: pointer;
  }
  .btn-refresh:hover { background: rgba(255,255,255,0.16); }
  .btn-settings {
    background: transparent; border: none;
    color: rgba(255,255,255,0.6); cursor: pointer; font-size: 14px;
    padding: 2px;
  }
  .btn-settings:hover { color: #fff; }

  /* Page footer */
  .page-footer {
    margin-top: 32px;
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    color: var(--muted-2);
    font-size: 14px;
    text-align: left;
  }

  #loading-bar {
    height: 2px;
    background: var(--green-bar);
    width: 0%;
    transition: width 0.4s ease;
    position: fixed; top: 52px; left: 0; z-index: 200;
  }

  #status-banner {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    color: var(--muted-2);
    font-size: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  #status-banner.hidden { display: none; }
  #status-banner.error { background: #fef2f2; color: var(--red); }
  #status-banner.success { background: #f0fdf4; color: var(--green-bar); }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--dark);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FILTERS ── */
  .filters-wrap {
    padding: 14px 24px 8px;
    background: var(--bg);
  }
  .country-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .country-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px 6px 6px;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.15s;
  }
  .country-btn:hover { border-color: var(--muted); }
  .country-btn.active {
    background: var(--dark);
    border-color: var(--dark);
    color: #fff;
  }
  .country-btn .flag {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #e5e7eb;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700;
    color: var(--text);
    letter-spacing: 0;
  }
  .country-btn.active .flag {
    background: var(--surface);
    color: var(--dark);
  }

  .site-row {
    display: flex; gap: 6px; flex-wrap: wrap;
    max-height: 120px; overflow-y: auto;
  }
  .site-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 12px;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .site-btn:hover { border-color: var(--muted); color: var(--text); }
  .site-btn.active {
    background: var(--dark);
    border-color: var(--dark);
    color: #fff;
  }

  /* ── KPI STRIP ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 4px 24px 14px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
  }
  .kpi-card.green::before { background: var(--green-bar); }
  .kpi-card.red::before { background: var(--red); }
  .kpi-card.purple::before { background: var(--purple); }
  .kpi-card.amber::before { background: var(--amber); }
  .kpi-card.blue::before { background: var(--blue); }

  .kpi-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted-2);
    font-weight: 600;
    margin-bottom: 5px;
  }
  .kpi-value {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 3px;
    display: flex; align-items: baseline; gap: 4px;
  }
  .kpi-value .unit { font-size: 13px; font-weight: 500; color: var(--text); }
  .kpi-value .trend-icon { font-size: 12px; color: var(--green-bar); font-weight: 400; }
  .kpi-value .trend-icon.flat { color: var(--muted); }
  .kpi-sub { font-size: 11px; color: var(--muted-2); }

  /* ── TABS ── */
  .tabs {
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 0;
    background: var(--bg);
  }
  .tab-btn {
    background: transparent; border: none;
    padding: 12px 16px;
    color: var(--muted-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--dark); font-weight: 600; }

  main { padding: 16px 24px; flex: 1; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
  }
  .card-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted-2);
    margin-bottom: 14px;
    font-weight: 600;
  }

  .chart-wrap { position: relative; height: 200px; }
  .chart-wrap-sm { position: relative; height: 180px; }
  .chart-wrap-lg { position: relative; height: 250px; }

  /* ── TABLES ── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted-2);
    font-weight: 600;
    padding: 10px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 11px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 12.5px;
    color: var(--text);
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface-alt); }
  .data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
  .data-table .green { color: var(--green-bar); }
  .data-table .red { color: var(--red); }
  .data-table .amber { color: var(--amber); }

  /* KV table for details */
  .kv-table { width: 100%; border-collapse: collapse; }
  .kv-table th {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted-2);
    font-weight: 600;
    padding: 6px 0 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .kv-table th.num { text-align: right; }
  .kv-table td {
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .kv-table tr:last-child td { border-bottom: none; }
  .kv-table td.label { color: var(--text); }
  .kv-table td.value {
    text-align: right;
    color: var(--text);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .kv-table td.value .sub {
    color: var(--muted-2);
    font-weight: 400;
    margin-left: 8px;
    font-size: 11px;
  }

  /* ── MINI STATS (rentals) ── */
  .mini-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .mini-stat {
    padding: 6px 14px;
    border-right: 1px solid var(--border);
  }
  .mini-stat:last-child { border-right: none; }
  .mini-stat .ms-val {
    font-size: 22px; font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .mini-stat .ms-val.green { color: var(--green-bar); }
  .mini-stat .ms-val.red { color: var(--amber); }
  .mini-stat .ms-val.neutral { color: var(--text); }
  .mini-stat .ms-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted-2);
    font-weight: 600;
  }

  /* Site pill in tables */
  .site-pill {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    margin-left: 6px;
  }
  .site-pill.fr { border-color: #dbeafe; background: #eff6ff; color: #1e40af; }
  .site-pill.nl { border-color: #fed7aa; background: #fff7ed; color: #9a3412; }

  /* Stat card big number */
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
  }
  .stat-card .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted-2);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .stat-card .value {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .stat-card .value.green { color: var(--green-bar); }
  .stat-card .value.red { color: var(--red); }
  .stat-card .value.amber { color: var(--amber); }
  .stat-card .value.purple { color: var(--purple); }
  .stat-card .value .unit { font-size: 15px; font-weight: 500; color: var(--text); }
  .stat-card .sub {
    font-size: 11px;
    color: var(--muted-2);
    margin-top: 6px;
  }

  .variance-text {
    text-align: center;
    margin-top: 8px;
    font-size: 12px;
    font-weight: 500;
  }
  .variance-text.pos { color: var(--green-bar); }
  .variance-text.neg { color: var(--red); }
  .variance-text.none { color: var(--muted); }

  /* Progress bars */
  .progress-bar {
    height: 6px;
    background: var(--surface-alt);
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .progress-bar-fill.green { background: var(--green-bar); }
  .progress-bar-fill.amber { background: var(--amber); }

  /* Toggle (Portfolio/By Store) */
  .toggle-group {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
  }
  .toggle-btn {
    background: transparent;
    border: none;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted-2);
    cursor: pointer;
    border-radius: 999px;
  }
  .toggle-btn.active {
    background: var(--dark);
    color: #fff;
  }

  /* Trends header */
  .trends-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .trends-scope {
    font-size: 13px;
    color: var(--muted-2);
    font-weight: 400;
  }

  /* Details table single-row */
  .details-site-table { margin-bottom: 14px; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 50px 20px;
    color: var(--muted-2);
  }
  .empty-state .big { font-size: 36px; margin-bottom: 10px; }
  .empty-state code {
    background: var(--surface-alt);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    border: 1px solid var(--border);
  }

  .section-gap { height: 12px; }

  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    main { padding: 14px; }
    header { padding: 0 14px; }
    .filters-wrap, .tabs { padding-left: 14px; padding-right: 14px; }
  }
</style>
</head>
<body>

<!-- CONFIG MODAL -->
<div id="config-modal">
  <div class="modal-box">
    <h2>1BOX Dashboard</h2>
    <p class="subtitle">Connect to your Microsoft account to automatically pull MIS reports from your OneDrive folder.</p>

    <div class="field-group">
      <label>Microsoft Client ID</label>
      <input type="text" id="cfg-client-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
      <div class="hint">From your Azure App Registration.</div>
    </div>

    <div class="field-group">
      <label>OneDrive Folder Path</label>
      <input type="text" id="cfg-folder" placeholder="/1Box MIS Reports" value="/1Box MIS Reports">
    </div>

    <div class="field-group">
      <label>Claude API Key</label>
      <input type="password" id="cfg-api-key" placeholder="sk-ant-...">
      <div class="hint">Stored only in your browser's local storage.</div>
    </div>

    <button class="btn-primary" onclick="saveConfig()">Connect & Load Dashboard</button>
    <button class="btn-secondary" onclick="loadDemo()">Load with Demo Data</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="loading-bar"></div>

  <header>
    <div class="logo">
      <img src="logo.jpg" alt="1BOX Self Storage" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'font-family:Syne,sans-serif;font-weight:800;color:#fff\'>1BOX</span>'">
    </div>
    <div class="header-right">
      <span id="last-updated"></span>
      <button class="btn-refresh" onclick="refreshData()">↻ Refresh</button>
      <button class="btn-settings" onclick="showConfig()" title="Settings">⚙</button>
    </div>
  </header>

  <div id="status-banner" class="hidden">
    <div class="spinner" id="status-spinner"></div>
    <span id="status-text"></span>
  </div>

  <!-- Country + Site Filters -->
  <div class="filters-wrap">
    <div class="country-row">
      <button class="country-btn" onclick="setCountry('fr')" id="f-fr">
        <span class="flag">FR</span>France
      </button>
      <button class="country-btn" onclick="setCountry('nl')" id="f-nl">
        <span class="flag">NL</span>Netherlands
      </button>
    </div>
    <div class="site-row" id="site-filters"></div>
  </div>

  <!-- KPI Row -->
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('overview')" id="tab-overview">Overview</button>
    <button class="tab-btn" onclick="switchTab('occupancy')" id="tab-occupancy">Occupancy</button>
    <button class="tab-btn" onclick="switchTab('rentals')" id="tab-rentals">Rentals</button>
    <button class="tab-btn" onclick="switchTab('revenue')" id="tab-revenue">Revenue</button>
    <button class="tab-btn" onclick="switchTab('details')" id="tab-details">Details</button>
    <button class="tab-btn" onclick="switchTab('trends')" id="tab-trends">Trends</button>
    <button class="tab-btn" onclick="switchTab('storagepilot')" id="tab-storagepilot">StoragePilot</button>
    <button class="tab-btn" onclick="switchTab('siteware')" id="tab-siteware">SiteWare</button>
  </div>

  <main>
    <div id="panel-overview" class="tab-panel active"></div>
    <div id="panel-occupancy" class="tab-panel"></div>
    <div id="panel-rentals" class="tab-panel"></div>
    <div id="panel-revenue" class="tab-panel"></div>
    <div id="panel-details" class="tab-panel"></div>
    <div id="panel-trends" class="tab-panel"></div>
    <div id="panel-storagepilot" class="tab-panel"></div>
    <div id="panel-siteware" class="tab-panel"></div>
  </main>
  <footer class="page-footer" id="page-footer">
    Data sourced from 1Box MIS Reports
  </footer>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIG & STATE
// ─────────────────────────────────────────────
let CONFIG = {};
let RAW_DATA = [];
let HISTORY_DATA = null;
let BUDGET_DATA = null;
let FILTERED_DATA = [];
let CURRENT_COUNTRY = 'fr';
let CURRENT_SITE = 'all';
let TRENDS_VIEW = 'portfolio'; // 'portfolio' | 'bystore'
let CHARTS = {};
let IS_DEMO = false;
let MS_TOKEN = null;

// ─────────────────────────────────────────────
// FORMATTERS (EU format: "97 387 €", "14,63 €/m²")
// ─────────────────────────────────────────────
function fmt(n, dec) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  dec = dec || 0;
  return Number(n).toLocaleString('fr-FR', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function fmtEur(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return fmt(n, 0) + ' €';
}
function fmtEurDec(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return fmt(n, 2) + ' €';
}
function fmtRate(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return fmt(n, 2) + ' €/m²';
}
function fmtPct(n, dec) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  dec = dec !== undefined ? dec : 1;
  return fmt(n, dec) + ' %';
}

// ─────────────────────────────────────────────
// CONFIG / AUTH
// ─────────────────────────────────────────────
function saveConfig() {
  CONFIG = {
    clientId: document.getElementById('cfg-client-id').value.trim(),
    folder: document.getElementById('cfg-folder').value.trim() || '/1Box MIS Reports',
    apiKey: document.getElementById('cfg-api-key').value.trim()
  };
  if (!CONFIG.clientId || !CONFIG.apiKey) {
    alert('Please fill in Client ID and Claude API Key');
    return;
  }
  localStorage.setItem('1box_config', JSON.stringify(CONFIG));
  document.getElementById('config-modal').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  startAuth();
}

function showConfig() {
  document.getElementById('config-modal').classList.remove('hidden');
  const s = localStorage.getItem('1box_config');
  if (s) {
    const c = JSON.parse(s);
    document.getElementById('cfg-client-id').value = c.clientId || '';
    document.getElementById('cfg-folder').value = c.folder || '/1Box MIS Reports';
    document.getElementById('cfg-api-key').value = c.apiKey || '';
  }
}

function loadDemo() {
  IS_DEMO = true;
  document.getElementById('config-modal').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  RAW_DATA = generateDemoData();
  HISTORY_DATA = generateDemoHistory();
  renderAll();
  document.getElementById('last-updated').textContent = 'Demo data — ' + new Date().toLocaleDateString('en-GB');
}

function startAuth() {
  const stored = localStorage.getItem('ms_token');
  if (stored) {
    try {
      const payload = JSON.parse(atob(stored.split('.')[1]));
      const expiresAt = payload.exp * 1000;
      if (Date.now() < expiresAt - 60000) {
        MS_TOKEN = stored;
        refreshData();
        return;
      }
      localStorage.removeItem('ms_token');
    } catch(e) {
      localStorage.removeItem('ms_token');
    }
  }

  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.slice(1));
    MS_TOKEN = params.get('access_token');
    localStorage.setItem('ms_token', MS_TOKEN);
    window.location.hash = '';
    refreshData();
    return;
  }
  const authUrl = `https://login.microsoftonline.com/common/oauth2/v2.0/authorize` +
    `?client_id=${encodeURIComponent(CONFIG.clientId)}` +
    `&response_type=token` +
    `&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}` +
    `&scope=${encodeURIComponent('Files.Read User.Read')}` +
    `&response_mode=fragment`;
  window.location.href = authUrl;
}

async function tryLoadFromGitHub() {
  try {
    const resp = await fetch('data/latest.json?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) return null;
    const data = await resp.json();
    if (!Array.isArray(data.sites) || data.sites.length === 0) return null;

    const dataDate = new Date(data.date + 'T00:00:00');
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const daysOld = Math.floor((today - dataDate) / (1000 * 60 * 60 * 24));
    if (daysOld > 5) return null;

    window._dashDataDate = data.date;
    window._dashDaysOld = daysOld;
    return data.sites;
  } catch (e) { return null; }
}

async function tryLoadHistory() {
  try {
    const resp = await fetch('data/history.json?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) return null;
    const data = await resp.json();
    if (!data || !data.sites) return null;
    return data;
  } catch (e) { return null; }
}

async function tryLoadBudgets() {
  try {
    const resp = await fetch('data/budgets.json?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) return null;
    const data = await resp.json();
    if (!data || !data.sites) return null;
    return data;
  } catch (e) { return null; }
}

function getCurrentMonthKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function siteKeyFromName(name) {
  if (!HISTORY_DATA) return null;
  for (const [key, siteObj] of Object.entries(HISTORY_DATA.sites)) {
    if (siteObj.name === name) return key;
  }
  return null;
}

function getBudgetTotals() {
  const monthKey = getCurrentMonthKey();
  if (!BUDGET_DATA) return { revenue: null, occupancy_pct: null, hasData: false };

  let totalRev = 0, totalRentedSqm = 0, totalSqm = 0;
  let anyNonNull = false;

  FILTERED_DATA.forEach(d => {
    const siteKey = siteKeyFromName(d.site_name);
    if (!siteKey) return;
    const siteBudgets = BUDGET_DATA.sites[siteKey];
    if (!siteBudgets) return;
    const monthBudget = siteBudgets[monthKey];
    if (!monthBudget) return;

    if (monthBudget.revenue !== null && monthBudget.revenue !== undefined) {
      totalRev += monthBudget.revenue;
      anyNonNull = true;
    }
    if (monthBudget.occupancy_pct !== null && monthBudget.occupancy_pct !== undefined) {
      const sqm = d.occupancy?.total_sqm || 0;
      totalSqm += sqm;
      totalRentedSqm += (monthBudget.occupancy_pct / 100) * sqm;
      anyNonNull = true;
    }
  });

  return {
    revenue: anyNonNull && totalRev > 0 ? totalRev : null,
    occupancy_pct: totalSqm > 0 ? (totalRentedSqm / totalSqm * 100) : null,
    hasData: anyNonNull
  };
}

async function refreshData() {
  if (IS_DEMO) { renderAll(); return; }

  // Refresh StoragePilot CSVs alongside MIS data
  loadStoragePilotData().then(() => {
    if (document.getElementById('panel-storagepilot')?.classList.contains('active')) {
      renderStoragePilot();
    }
  });

  // Refresh SiteWare audit data
  loadSiteWareData().then(() => {
    if (document.getElementById('panel-siteware')?.classList.contains('active')) {
      renderSiteWare();
    }
  });

  setStatus('loading', 'Checking for today\'s data…');
  const [cached, hist, budgets] = await Promise.all([tryLoadFromGitHub(), tryLoadHistory(), tryLoadBudgets()]);
  if (hist) HISTORY_DATA = hist;
  if (budgets) BUDGET_DATA = budgets;

  if (cached) {
    RAW_DATA = cached;
    renderAll();
    setStatus('success', `Loaded ${cached.length} sites from cache`);
    setTimeout(() => hideStatus(), 2000);
    updateLastUpdatedLabel();
    return;
  }

  setStatus('loading', 'Loading dashboard data…');
  setProgress(10);

  try {
    const folderPath = CONFIG.folder.replace(/^\//, '');
    const rootRes = await graphFetch('https://graph.microsoft.com/v1.0/me/drive/root/children');
    if (!rootRes.ok) throw new Error('Cannot access OneDrive.');
    const rootData = await rootRes.json();
    const folder = (rootData.value||[]).find(f => f.name === folderPath);
    if (!folder) throw new Error(`Folder "${folderPath}" not found.`);

    const listRes = await graphFetch(`https://graph.microsoft.com/v1.0/me/drive/items/${folder.id}/children?$orderby=lastModifiedDateTime desc&$top=100`);
    const listData = await listRes.json();
    const allFiles = listData.value || [];

    const jsonFiles = allFiles.filter(f => f.name.endsWith('.json'));
    const todayJsonFiles = getTodaysFiles(jsonFiles);

    if (todayJsonFiles.length > 0) {
      setStatus('loading', `Loading ${todayJsonFiles.length} pre-processed reports…`);
      setProgress(30);
      const siteDataArr = [];
      const results = await Promise.all(todayJsonFiles.map(async (f) => {
        const dlRes = await graphFetch(f['@microsoft.graph.downloadUrl'] || `https://graph.microsoft.com/v1.0/me/drive/items/${f.id}/content`);
        const text = await dlRes.text();
        try { return JSON.parse(text); } catch(e) { return null; }
      }));
      results.forEach(r => { if (r) siteDataArr.push(r); });
      if (siteDataArr.length > 0) {
        RAW_DATA = siteDataArr;
        setProgress(100);
        renderAll();
        setTimeout(() => setProgress(0), 500);
        setStatus('success', `Loaded ${siteDataArr.length} sites`);
        setTimeout(() => hideStatus(), 3000);
        updateLastUpdatedLabel();
        return;
      }
    }

    const pdfFiles = allFiles.filter(f => f.name.endsWith('.pdf'));
    if (pdfFiles.length === 0) throw new Error('No reports found in OneDrive.');
    const todayFiles = getTodaysFiles(pdfFiles);
    setStatus('loading', `Processing ${todayFiles.length} PDFs…`);
    setProgress(20);

    const downloads = await Promise.all(todayFiles.map(async (f) => {
      const dlRes = await graphFetch(f['@microsoft.graph.downloadUrl'] || `https://graph.microsoft.com/v1.0/me/drive/items/${f.id}/content`);
      const blob = await dlRes.blob();
      const b64 = await blobToBase64(blob);
      return { name: f.name, b64 };
    }));

    const siteDataArr = [];
    for (let i = 0; i < downloads.length; i += 1) {
      setStatus('loading', `Processing ${i+1} of ${downloads.length}…`);
      setProgress(20 + (70 * i / downloads.length));
      const r = await extractWithClaude(downloads[i].b64, downloads[i].name);
      if (r) siteDataArr.push(r);
      if (i + 1 < downloads.length) await new Promise(r => setTimeout(r, 6000));
    }

    RAW_DATA = siteDataArr;
    setProgress(95);
    renderAll();
    setProgress(100);
    setTimeout(() => setProgress(0), 500);
    setStatus('success', `Dashboard updated`);
    setTimeout(() => hideStatus(), 3000);
    updateLastUpdatedLabel();

  } catch(e) {
    setProgress(0);
    setStatus('error', e.message || 'Failed to fetch');
    console.error('Dashboard error:', e);
  }
}

function updateLastUpdatedLabel() {
  const el = document.getElementById('last-updated');
  if (window._dashDataDate && window._dashDaysOld > 0) {
    const d = new Date(window._dashDataDate + 'T00:00:00').toLocaleDateString('en-GB', {day:'numeric', month:'short'});
    el.textContent = 'Data from ' + d + ' (' + window._dashDaysOld + ' day' + (window._dashDaysOld>1?'s':'') + ' old)';
  } else {
    el.textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  }
}

function getTodaysFiles(files) {
  if (!files || files.length === 0) return [];
  const validFiles = files.filter(f => f && f.lastModifiedDateTime);
  if (validFiles.length === 0) return [];
  const today = new Date().toDateString();
  const todayFiles = validFiles.filter(f => new Date(f.lastModifiedDateTime).toDateString() === today);
  if (todayFiles.length === 0) {
    const latest = new Date(validFiles[0].lastModifiedDateTime).toDateString();
    return validFiles.filter(f => new Date(f.lastModifiedDateTime).toDateString() === latest);
  }
  return todayFiles;
}

async function graphFetch(url) {
  const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + MS_TOKEN } });
  if (res.status === 401) {
    localStorage.removeItem('ms_token');
    startAuth();
    throw new Error('Token expired');
  }
  return res;
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

async function extractWithClaude(pdfBase64, filename) {
  const country = filename.toLowerCase().includes('nl') || filename.toLowerCase().includes('best') ? 'NL' : 'FR';
  const prompt = `Extract data from this 1BOX MIS report PDF. Return ONLY valid JSON with this structure (use null for missing, numbers not strings):
{
  "site_name": "string",
  "country": "${country}",
  "date": "YYYY-MM-DD",
  "occupancy": { "unit_pct": 0, "surface_pct": 0, "total_units": 0, "rented_units": 0, "vacant_units": 0, "total_sqm": 0, "rented_sqm": 0, "vacant_sqm": 0, "locked_units": 0, "terminated_units": 0, "reserved_units": 0, "out_of_order_units": 0, "business_units": 0, "private_units": 0 },
  "rentals": { "move_ins_today": 0, "move_ins_week": 0, "move_ins_month": 0, "move_ins_year": 0, "vacates_today": 0, "vacates_week": 0, "vacates_month": 0, "vacates_year": 0, "net_today": 0, "net_week": 0, "net_month": 0, "net_year": 0, "transfers_in_today": 0, "transfers_in_week": 0, "transfers_in_month": 0, "transfers_in_year": 0, "transfers_out_today": 0, "transfers_out_week": 0, "transfers_out_month": 0, "transfers_out_year": 0 },
  "revenue": { "gross_rent": 0, "discounts": 0, "net_rent": 0, "gross_insurance": 0, "net_insurance": 0, "gross_total": 0, "net_total": 0, "invoiced_in_advance": 0, "current_rent_amount": 0, "max_rent_potential": 0, "avg_rate_per_sqm": 0, "max_rate_per_sqm": 0 },
  "arrears": { "outstanding_total": 0, "arrears_30_plus": 0, "arrears_count": 0, "payment_without_inv": 0, "doubtful_debtors": 0 },
  "insurance": { "policies_count": 0, "insured_value": 0, "premium_total": 0, "pct_insured": 0 }
}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': CONFIG.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{
        role: 'user',
        content: [
          { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) throw new Error('Claude API error: ' + response.status);
  const data = await response.json();
  const text = data.content[0].text.replace(/```json|```/g, '').trim();
  try { return JSON.parse(text); } catch(e) { return null; }
}

// FILTERS
// ─────────────────────────────────────────────
function setCountry(c) {
  CURRENT_COUNTRY = c;
  CURRENT_SITE = 'all';
  renderSiteFilters();
  renderCountryButtons();
  renderAll();
}

function setSite(s) {
  CURRENT_SITE = s;
  renderSiteFilters();
  renderAll();
}

function renderCountryButtons() {
  document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + CURRENT_COUNTRY)?.classList.add('active');
}

function renderSiteFilters() {
  const el = document.getElementById('site-filters');
  const countrySites = RAW_DATA
    .filter(d => CURRENT_COUNTRY === 'all' || d.country.toLowerCase() === CURRENT_COUNTRY)
    .map(d => d.site_name)
    .filter((s, i, arr) => s && arr.indexOf(s) === i)
    .sort();

  let html = '';
  html += `<button class="site-btn${CURRENT_SITE === 'all' ? ' active' : ''}" onclick="setSite('all')">All Sites</button>`;
  countrySites.forEach(s => {
    const label = s.replace(/^1BOX\s+/i, '').replace(/^1Box\s+/i, '');
    html += `<button class="site-btn${CURRENT_SITE === s ? ' active' : ''}" onclick="setSite('${s.replace(/'/g,"\\'")}')">${label}</button>`;
  });
  el.innerHTML = html;
}

function applyFilters() {
  FILTERED_DATA = RAW_DATA.filter(d => {
    if (CURRENT_COUNTRY !== 'all' && d.country.toLowerCase() !== CURRENT_COUNTRY) return false;
    if (CURRENT_SITE !== 'all' && d.site_name !== CURRENT_SITE) return false;
    return true;
  });
}

// ─────────────────────────────────────────────
// AGGREGATION
// ─────────────────────────────────────────────
function agg(key) {
  return FILTERED_DATA.reduce((sum, d) => {
    const v = key.split('.').reduce((o,k) => o?.[k], d);
    return sum + (v || 0);
  }, 0);
}
function aggPct(num, den) {
  const n = agg(num), d = agg(den);
  return d ? (n / d * 100) : 0;
}

// IMPORTANT: Claude extracts the MIS PDF rental rows so that move_ins_<period>
// is already NET of transfers (i.e., "New total" - "New transfer"). Per-site
// verification: Nijmegen-Wijchen PDF showed "New total month=17, New transfer
// month=1"; the extracted JSON has move_ins_month=16. So the subtraction has
// already happened during extraction. The transfers_in_<period> /
// transfers_out_<period> fields are kept for reference but MUST NOT be
// subtracted again here, or we double-subtract. Sum across 29 NL sites:
// 434 MI / 414 MO / 20 Net -- matches Power BI exactly.
function netMIFromRow(row, period) {
  return row?.rentals?.['move_ins_' + period] || 0;
}
function netMOFromRow(row, period) {
  return row?.rentals?.['vacates_' + period] || 0;
}
function netNetFromRow(row, period) {
  return netMIFromRow(row, period) - netMOFromRow(row, period);
}
function aggNetMI(period) {
  return FILTERED_DATA.reduce((s, d) => s + netMIFromRow(d, period), 0);
}
function aggNetMO(period) {
  return FILTERED_DATA.reduce((s, d) => s + netMOFromRow(d, period), 0);
}
function aggNetNet(period) {
  return FILTERED_DATA.reduce((s, d) => s + netNetFromRow(d, period), 0);
}
function netMIFromHist(entry) {
  return entry?.rentals?.move_ins_month || 0;
}
function netMOFromHist(entry) {
  return entry?.rentals?.vacates_month || 0;
}
function netNetFromHist(entry) {
  return netMIFromHist(entry) - netMOFromHist(entry);
}

// Returns {monthKeys, monthNames, currentMonthKey} from Jan 2026 through today's
// month. monthNames are short labels with the current month suffixed " MTD".
// Used by all "history through current MTD" charts so they stay in sync as the
// calendar advances. Once Jan 2027 rolls around, the list grows to include all
// of 2026 + Jan 2027.
function getDashboardMonths() {
  const monthNamesShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today = new Date();
  const currentYear = today.getFullYear();
  const currentMonth = today.getMonth() + 1;
  const currentMonthKey = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;

  const monthKeys = [];
  const monthNames = [];
  let y = 2026, m = 1;
  while (true) {
    const mk = `${y}-${String(m).padStart(2, '0')}`;
    monthKeys.push(mk);
    const isCurrent = (mk === currentMonthKey);
    const label = monthNamesShort[m - 1];
    // Include the year only if we've crossed into 2027+
    const yearSuffix = y > 2026 ? ` '${String(y).slice(2)}` : '';
    monthNames.push(isCurrent ? `${label}${yearSuffix} MTD` : `${label}${yearSuffix}`);
    if (mk === currentMonthKey) break;
    m++;
    if (m > 12) { m = 1; y++; }
    if (monthKeys.length > 36) break; // safety
  }
  return { monthKeys, monthNames, currentMonthKey };
}

// KPIs
// ─────────────────────────────────────────────
function renderKPIs() {
  const sqmPct = aggPct('occupancy.rented_sqm','occupancy.total_sqm');
  const rentedSqm = agg('occupancy.rented_sqm');
  const totalSqm = agg('occupancy.total_sqm');
  const netMTD = aggNetNet('month');
  const moveInMTD = aggNetMI('month');
  const vacateMTD = aggNetMO('month');
  const currRent = agg('revenue.current_rent_amount');
  const avgRate = rentedSqm ? (currRent / rentedSqm) : 0;
  const arrears30 = agg('arrears.arrears_30_plus');
  const moveInYTD = aggNetMI('year');
  const vacateYTD = aggNetMO('year');

  // Net SQM MTD (approximate via avg unit size)
  let netSqmMTD = 0;
  FILTERED_DATA.forEach(d => {
    const avgSize = (d.occupancy?.rented_units || 0) > 0 ? (d.occupancy.rented_sqm / d.occupancy.rented_units) : 0;
    netSqmMTD += netNetFromRow(d, 'month') * avgSize;
  });

  const maxRate = Math.max(0, ...FILTERED_DATA.map(d => d.revenue?.avg_rate_per_sqm || 0));
  const maxPotential = agg('revenue.max_rent_potential');

  // Occupied revenue per square metre — current rent / rented sqm
  const occupRPSM = rentedSqm ? (currRent / rentedSqm) : 0;

  // Prior-month occupancy % from history.json, scoped to the same country/site
  // filter as the live view, for the "vs prior month" delta on the SQM card.
  let priorOccPct = null, priorMonthName = '';
  {
    const { monthKeys } = getDashboardMonths();
    if (monthKeys.length >= 2 && HISTORY_DATA && HISTORY_DATA.sites) {
      const priorMK = monthKeys[monthKeys.length - 2];
      const monthNamesShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      priorMonthName = monthNamesShort[parseInt(priorMK.split('-')[1], 10) - 1];
      const histSites = Object.values(HISTORY_DATA.sites).filter(s => {
        if (s.is_rollup) return false;
        if (CURRENT_COUNTRY === 'fr') return s.country === 'FR';
        if (CURRENT_COUNTRY === 'nl') return s.country === 'NL';
        return true;
      });
      const scoped = CURRENT_SITE === 'all' ? histSites : histSites.filter(s => s.name === CURRENT_SITE);
      let rS = 0, tS = 0;
      scoped.forEach(s => {
        const e = (s.series || []).find(x => x.month === priorMK);
        if (e?.occupancy) {
          rS += e.occupancy.rented_sqm || 0;
          tS += e.occupancy.total_sqm || 0;
        }
      });
      if (tS > 0) priorOccPct = rS / tS * 100;
    }
  }
  const occDelta = (priorOccPct !== null) ? (sqmPct - priorOccPct) : null;
  const occDeltaStr = (occDelta !== null)
    ? `${occDelta >= 0 ? '+' : ''}${fmt(occDelta, 1)} pp vs ${priorMonthName}`
    : '&nbsp;';

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card red">
      <div class="kpi-label">SQM OCCUPANCY</div>
      <div class="kpi-value">${fmt(sqmPct, 1)}<span class="unit">%</span></div>
      <div class="kpi-sub">${occDeltaStr}</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">NET RENTALS (MTD)</div>
      <div class="kpi-value">${netMTD >= 0 ? '+' : ''}${netMTD}</div>
      <div class="kpi-sub">${moveInMTD} in / ${vacateMTD} out</div>
    </div>
    <div class="kpi-card purple">
      <div class="kpi-label">CURRENT RENT</div>
      <div class="kpi-value">${fmtEur(currRent)}</div>
      <div class="kpi-sub">${fmtRate(avgRate)}</div>
    </div>
    <div class="kpi-card amber">
      <div class="kpi-label">ARREARS > 30 DAYS</div>
      <div class="kpi-value">${fmtEur(arrears30)}</div>
      <div class="kpi-sub">&nbsp;</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">MTD MOVE-INS</div>
      <div class="kpi-value">${moveInMTD}</div>
      <div class="kpi-sub">${moveInYTD} yr to date</div>
    </div>
    <div class="kpi-card amber">
      <div class="kpi-label">MTD VACATES</div>
      <div class="kpi-value">${vacateMTD}</div>
      <div class="kpi-sub">${vacateYTD} yr to date</div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">MTD NET SQM</div>
      <div class="kpi-value">+${fmt(Math.round(netSqmMTD))} <span class="unit">m²</span></div>
      <div class="kpi-sub">+${netMTD} net contracts</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">OCCUP. RPSM</div>
      <div class="kpi-value">${fmtRate(occupRPSM)}</div>
      <div class="kpi-sub">Rent per occupied m²</div>
    </div>
  `;
}

// PER-STORE AI SUMMARIES
// ─────────────────────────────────────────────
// Summaries live at data/summaries/{siteKey}.txt, pre-generated by a nightly
// backend script calling the Anthropic API. Dashboard loads them as static
// files — no API key exposure. Cached per-session in memory and per-day in
// localStorage so we don't refetch on every tab switch.
const SUMMARY_CACHE = {};

function summaryCacheDateKey() {
  // Local YYYY-MM-DD — invalidates the cache once per day
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

async function loadSiteSummary(siteKey) {
  if (!siteKey) return null;

  // In-memory cache hit
  if (SUMMARY_CACHE[siteKey] !== undefined) return SUMMARY_CACHE[siteKey];

  // localStorage cache hit (only if from today)
  try {
    const stored = localStorage.getItem('summary:' + siteKey);
    if (stored) {
      const parsed = JSON.parse(stored);
      if (parsed.date === summaryCacheDateKey()) {
        SUMMARY_CACHE[siteKey] = parsed.text;
        return parsed.text;
      }
    }
  } catch (e) { /* ignore corrupt cache */ }

  // Fetch fresh
  try {
    const resp = await fetch(`data/summaries/${siteKey}.txt?t=${Date.now()}`, { cache: 'no-store' });
    if (!resp.ok) {
      SUMMARY_CACHE[siteKey] = null;
      return null;
    }
    const text = (await resp.text()).trim();
    if (!text) {
      SUMMARY_CACHE[siteKey] = null;
      return null;
    }
    SUMMARY_CACHE[siteKey] = text;
    try {
      localStorage.setItem('summary:' + siteKey, JSON.stringify({
        date: summaryCacheDateKey(),
        text: text
      }));
    } catch (e) { /* ignore quota errors */ }
    return text;
  } catch (e) {
    console.log(`Summary: failed to load ${siteKey}:`, e.message);
    SUMMARY_CACHE[siteKey] = null;
    return null;
  }
}

function injectSiteSummary(siteKey) {
  if (!siteKey) return;
  loadSiteSummary(siteKey).then(text => {
    if (!text) return;
    // Only inject if we're still viewing the same site and still on Overview
    const panel = document.getElementById('panel-overview');
    if (!panel) return;
    // Don't inject twice
    if (panel.querySelector('.site-summary-card')) return;

    const card = document.createElement('div');
    card.className = 'site-summary-card card';
    card.style.cssText = 'margin-bottom:12px;border-left:3px solid #6366f1;background:linear-gradient(to right,rgba(99,102,241,0.04),transparent);opacity:0;transition:opacity 300ms ease-in';
    card.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="font-size:18px;line-height:1.4">✨</div>
        <div style="flex:1">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted-2);margin-bottom:6px">Trend Summary</div>
          <div style="font-size:14px;line-height:1.55;color:var(--text)">${escapeHtml(text)}</div>
        </div>
      </div>
    `;
    panel.insertBefore(card, panel.firstChild);
    // Fade in
    requestAnimationFrame(() => { card.style.opacity = '1'; });
  });
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Build the JSON context Claude sees about the current site.
// Pulled from data structures the dashboard has already loaded.
function buildSiteContext(siteKey) {
  if (!siteKey || !HISTORY_DATA?.sites?.[siteKey]) return '';
  const site = HISTORY_DATA.sites[siteKey];
  const ctx = {
    site_key: siteKey,
    site_name: site.name,
    country: site.country,
    monthly_history: (site.series || []).slice(-6).map(r => {
      const occ = r.occupancy || {};
      const ren = r.rentals || {};
      const rev = r.revenue || {};
      const arr = r.arrears || {};
      // move_ins_month is already net of transfers from extraction (see comment
      // by netMIFromRow). Don't subtract transfers again.
      return {
        month: r.month,
        occupancy_unit_pct: occ.unit_pct,
        occupancy_sqm_pct: occ.surface_pct,
        rented_units: occ.rented_units,
        total_units: occ.total_units,
        move_ins_month: ren.move_ins_month,
        vacates_month: ren.vacates_month,
        net_rentals_month: ren.net_month,
        revenue_net: rev.net_total,
        avg_rate_per_sqm: rev.avg_rate_per_sqm,
        arrears_outstanding: arr.outstanding_total,
        arrears_count: arr.arrears_count
      };
    })
  };

  // Latest day's snapshot from the current MIS data, if available
  const latest = FILTERED_DATA && FILTERED_DATA.length === 1 ? FILTERED_DATA[0] : null;
  if (latest) {
    ctx.latest_snapshot = {
      date: latest.date,
      occupancy_sqm_pct: latest.occupancy ? (latest.occupancy.rented_sqm / latest.occupancy.total_sqm * 100) : null,
      rented_units: latest.occupancy?.rented_units,
      total_units: latest.occupancy?.total_units,
      revenue_net: latest.revenue?.net_total,
      arrears_outstanding: latest.arrears?.outstanding_total
    };
  }

  // StoragePilot per-store data — sum across April from daily files
  if (typeof SP_DATA !== 'undefined' && SP_DATA.byLocation && CURRENT_SITE) {
    const colName = findSpLocationColumn(SP_DATA.byLocation.headers, CURRENT_SITE);
    if (colName) {
      const totalCalls = SP_DATA.byLocation.rows.reduce(
        (s, r) => s + (Number(r[colName]) || 0), 0
      );
      let totalEsc = 0;
      if (SP_DATA.escalationsByLocation) {
        const escCol = findSpLocationColumn(SP_DATA.escalationsByLocation.headers, CURRENT_SITE);
        if (escCol) {
          totalEsc = SP_DATA.escalationsByLocation.rows.reduce(
            (s, r) => s + (Number(r[escCol]) || 0), 0
          );
        }
      }
      ctx.storagepilot_conversations = {
        period: 'April 2026',
        total_calls: totalCalls,
        total_escalations: totalEsc,
        escalation_pct: totalCalls > 0 ? Math.round((totalEsc / totalCalls) * 1000) / 10 : 0
      };
    }
  }

  // SiteWare audit data (NL only, snapshot)
  if (typeof SW_DATA !== 'undefined' && SW_DATA.audits && CURRENT_SITE) {
    const swRow = matchSwRow(SW_DATA.audits.rows, CURRENT_SITE);
    if (swRow) {
      ctx.siteware_audit = {
        template: swRow['Template Name'],
        in_progress_pct: swRow['In Progress %'],
        completed_pct: swRow['Completed %'],
        grade: swRow['Audit Grade']
      };
    }
  }

  // Trend summary already loaded for this site, if any
  if (SUMMARY_CACHE[siteKey]) {
    ctx.previously_generated_trend_summary = SUMMARY_CACHE[siteKey];
  }

  return JSON.stringify(ctx, null, 2);
}

function setChatOpen(open) {

// Called from renderOverview when a per-store view is shown

  if (!CHAT_WORKER_URL) return;  // chat disabled until Worker URL is configured

  if (fab) fab.style.display = 'flex';

  if (CHAT_STATE.currentSiteKey !== siteKey) {
    CHAT_STATE.currentSiteKey = siteKey;

// Hide chat (used when leaving per-store view)
function hideChat() {
  const fab = document.getElementById('chat-fab');
  if (fab) fab.style.display = 'none';

function renderChatMessages() {
  const wrap = document.getElementById('chat-messages');
  const sugWrap = document.getElementById('chat-suggestions');
  if (!wrap || !sugWrap) return;

  if (CHAT_STATE.messages.length === 0) {
    wrap.innerHTML = `
      <div class="chat-empty">
        Ask Claude about <strong>${escapeHtml(document.getElementById('chat-site-label')?.textContent || 'this site')}</strong>.<br>
        Answers are based on this site's data — occupancy, rentals, revenue, arrears.
      </div>
    `;
    sugWrap.innerHTML = CHAT_SUGGESTIONS.map(q =>
      `<button class="chat-suggest-btn" data-q="${escapeHtml(q)}">${escapeHtml(q)}</button>`
    ).join('');
    sugWrap.querySelectorAll('.chat-suggest-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const q = btn.getAttribute('data-q');
        document.getElementById('chat-input').value = q;
        sendChatMessage();
      });
    });
    return;
  }

  sugWrap.innerHTML = '';
  wrap.innerHTML = CHAT_STATE.messages.map(m =>
    `<div class="chat-msg ${m.role === 'user' ? 'user' : (m.role === 'error' ? 'error' : 'assistant')}">${escapeHtml(m.content)}</div>`
  ).join('');
  // Scroll to bottom
  wrap.scrollTop = wrap.scrollHeight;
}

async function sendChatMessage() {
  if (CHAT_STATE.busy) return;
  if (!CHAT_WORKER_URL) {
    pushChatMessage('error', 'Chat is not yet configured. Set CHAT_WORKER_URL in index.html.');
    return;
  }
  const input = document.getElementById('chat-input');
  const text = (input?.value || '').trim();
  if (!text) return;
  input.value = '';
  autoGrowChatInput();

  // Build context from the currently-selected site's data
  const context = buildSiteContext(CHAT_STATE.currentSiteKey);
  if (!context) {
    pushChatMessage('error', 'No data available for this site.');
    return;
  }

  CHAT_STATE.messages.push({ role: 'user', content: text });
  CHAT_STATE.messages.push({ role: 'assistant', content: '…' });
  renderChatMessages();
  CHAT_STATE.busy = true;
  document.getElementById('chat-send').disabled = true;

  try {
    const apiMessages = CHAT_STATE.messages
      .slice(0, -1)  // exclude the placeholder we just pushed
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .map(m => ({ role: m.role, content: m.content }));

    const resp = await fetch(CHAT_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: apiMessages,
        siteContext: context
      })
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${errText.slice(0, 200)}`);
    }

    // Stream Server-Sent Events
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let assistantText = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const events = buffer.split('\n\n');
      buffer = events.pop();  // last chunk may be incomplete

      for (const evt of events) {
        const dataLines = evt.split('\n').filter(l => l.startsWith('data: '));
        for (const dl of dataLines) {
          const payload = dl.slice(6).trim();
          if (!payload || payload === '[DONE]') continue;
          try {
            const obj = JSON.parse(payload);
            if (obj.type === 'content_block_delta' && obj.delta?.type === 'text_delta') {
              assistantText += obj.delta.text || '';
              CHAT_STATE.messages[CHAT_STATE.messages.length - 1].content = assistantText || '…';
              renderChatMessages();
            }
          } catch (e) { /* ignore parse errors on partial chunks */ }
        }
      }
    }

    if (!assistantText) {
      CHAT_STATE.messages[CHAT_STATE.messages.length - 1].content = '(no response received)';
      CHAT_STATE.messages[CHAT_STATE.messages.length - 1].role = 'error';
    }
  } catch (e) {
    console.error('Chat error:', e);
    CHAT_STATE.messages[CHAT_STATE.messages.length - 1] = {
      role: 'error',
      content: 'Sorry — could not reach Claude. ' + (e.message || '')
    };
  } finally {
    CHAT_STATE.busy = false;
    document.getElementById('chat-send').disabled = false;
    renderChatMessages();
  }
}

function pushChatMessage(role, content) {
  CHAT_STATE.messages.push({ role, content });
  renderChatMessages();
}

            if (CURRENT_COUNTRY === 'nl') return s.country === 'NL';

          });

                tSqm += e.occupancy.total_sqm || 0;
              }
            });

          });

        // Current month MTD from live FILTERED_DATA — weighted average
        const currRentedSqm = FILTERED_DATA.reduce((s, d) => s + (d.occupancy?.rented_sqm || 0), 0);

        occActualByMonth[occCurrentKey] = currTotalSqm > 0 ? (currRentedSqm / currTotalSqm * 100) : 0;

        // Budgets: weight each site's budget % by its total_sqm to get portfolio-weighted budget
        occMonthKeys.forEach(mk => {
          let weightedSqm = 0, totalSqm = 0;
          FILTERED_DATA.forEach(d => {
            const key = siteKeyFromName(d.site_name);

              weightedSqm += (mb.occupancy_pct / 100) * sqm;
              totalSqm += sqm;
            }
          });
          occBudgetByMonth[mk] = totalSqm > 0 ? (weightedSqm / totalSqm * 100) : 0;

          if (!budget) return '';
          const v = actual - budget;

          return sign + fmt(Math.abs(v), 1) + ' pp';
        };

          occMonthNames[i],
          fmtOccVar(occActualByMonth[mk] || 0, occBudgetByMonth[mk] || 0)
        ]);

        const occBudgetData = occMonthKeys.map(mk => occBudgetByMonth[mk] || 0);

      // Pull Jan/Feb/Mar from history.json; April from live FILTERED_DATA
      const miMoMonths = [];
      const miSeries = [];
      const moSeries = [];
      const netSeries = [];
      const currentMonth = getCurrentMonthKey();

      if (HISTORY_DATA && HISTORY_DATA.sites) {
        const histSites = Object.values(HISTORY_DATA.sites).filter(s => {
          if (s.is_rollup) return false;
          if (CURRENT_COUNTRY === 'fr') return s.country === 'FR';
          if (CURRENT_COUNTRY === 'nl') return s.country === 'NL';
          return true;
        });

        const monthSet = new Set();
        histSites.forEach(s => (s.series || []).forEach(e => monthSet.add(e.month)));
        const histMonths = [...monthSet].sort();

        histMonths.forEach(m => {
          let miSum = 0, moSum = 0, netSum = 0;
          histSites.forEach(s => {
            const e = (s.series || []).find(x => x.month === m);
            if (e?.rentals) {
              miSum += netMIFromHist(e);
              moSum += netMOFromHist(e);
              netSum += netNetFromHist(e);
            }
          });
          miMoMonths.push(m);
          miSeries.push(miSum);
          moSeries.push(moSum);
          netSeries.push(netSum);
        });

        if (!miMoMonths.includes(currentMonth)) {
          miMoMonths.push(currentMonth);
          miSeries.push(totalMI);
          moSeries.push(totalMO);
          netSeries.push(totalMI - totalMO);
        }
      } else {
        miMoMonths.push(currentMonth);
        miSeries.push(totalMI);
        moSeries.push(totalMO);
        netSeries.push(totalMI - totalMO);
      }

      const miMoLabels = miMoMonths.map(m => {
        const [y, mo] = m.split('-');
        const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return names[parseInt(mo,10)-1] + ' ' + y;
      });

      const mtdMonthsSet = new Set([currentMonth]);

      mkLineChart('ch-mi-mo', miMoLabels, [
        { label: 'Move-Ins', data: miSeries, color: '#16a34a' },
        { label: 'Move-Outs', data: moSeries, color: '#f97316' }
      ], { yFmt: v => v, yMin: 0, mtdMonths: mtdMonthsSet, months: miMoMonths });

      mkLineChart('ch-net-rentals-ov', miMoLabels, [
        { label: 'Net Rentals', data: netSeries, color: '#f97316' }
      ], { yFmt: v => v, mtdMonths: mtdMonthsSet, months: miMoMonths });
    } else {
      // Single site view
      if (!revBudgetEmpty) {
        mkHBarChart('ch-rev-budget', ['Actual', 'Budget'], [{
          label: '', data: [actualRev, budgetTotals.revenue], color: ['#16a34a', '#d1d5db']
        }], v => fmt(v/1000, 0) + 'k');
      }
      if (!occBudgetEmpty) {
        mkHBarChart('ch-occ-budget', ['Actual', 'Budget'], [{
          label: '', data: [actualOcc, budgetTotals.occupancy_pct], color: ['#16a34a', '#d1d5db']
        }], v => v + '%', 100);
      }

      const periods = ['Today', 'Week', 'Month', 'Year'];
      const miVals = ['today','week','month','year'].map(p => aggNetMI(p));
      const vaVals = ['today','week','month','year'].map(p => aggNetMO(p));
      const netVals = miVals.map((v,i) => v - vaVals[i]);

      mkVBarChart('ch-rental-activity-ov', periods, [
        { label: 'Move-Ins', data: miVals, color: '#16a34a' },
        { label: 'Vacates', data: vaVals, color: '#f97316' },
        { label: 'Net', data: netVals, color: '#1f2937' }
      ]);

      const currRent = agg('revenue.current_rent_amount');
      const maxPotential = agg('revenue.max_rent_potential');
      const maxRent = Math.max(maxPotential, currRent * 1.5);
      mkHBarChart('ch-rent-breakdown',
        ['Current Rent', 'Potential Rent', 'Max Rent'],
        [{ label: '', data: [currRent, maxPotential, maxRent], color: ['#16a34a', '#8b5cf6', '#d1d5db'] }],
        v => fmt(v/1000, 0) + 'k'
      );
    }
  });
}

  const surfPct = aggPct('occupancy.rented_sqm', 'occupancy.total_sqm');
  const vacant = agg('occupancy.vacant_units');
  const vacantSqm = agg('occupancy.vacant_sqm');
  const rented = agg('occupancy.rented_units');
  const total = agg('occupancy.total_units');
  const totalSqm = agg('occupancy.total_sqm');
  const rentedSqm = agg('occupancy.rented_sqm');

  document.getElementById('panel-occupancy').innerHTML = `
    <div class="grid-3" style="margin-bottom:12px">
      <div class="stat-card" style="text-align:center">
        <div class="label">UNIT OCCUPANCY</div>
        <div class="value">${fmt(unitPct, 1)}<span class="unit">%</span></div>

        <div class="label">SURFACE OCCUPANCY</div>
        <div class="value">${fmt(surfPct, 1)}<span class="unit">%</span></div>
        <div class="sub">${fmt(rentedSqm)} m² of ${fmt(totalSqm)} m²</div>
      </div>
      <div class="stat-card" style="text-align:center">
        <div class="label">VACANT UNITS</div>
        <div class="value amber">${fmt(vacant)}</div>
        <div class="sub">${fmt(vacantSqm)} m² available</div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:12px">
        <div class="card-title" style="margin-bottom:0">Sqm Occupancy vs Budget</div>
        <div style="display:flex;gap:14px;font-size:11px;color:var(--muted-2);align-items:center;flex-wrap:wrap">
          <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;background:#16a34a;border-radius:2px"></span>≥80%</span>
          <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;background:#f97316;border-radius:2px"></span>50–80%</span>
          <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;background:#ef4444;border-radius:2px"></span>&lt;50%</span>
          <span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:18px;height:0;border-top:2px dashed #1a1a1a"></span>Budget</span>
        </div>
      </div>
      <div class="chart-wrap-lg"><canvas id="ch-occ-vs-budget"></canvas></div>
    </div>
  `;

  nextTick(() => {
    // Build month list: Jan 2026 through current month.
    // History.json has Jan/Feb/Mar EOM snapshots; live FILTERED_DATA covers the current month.
    const today = new Date();
    const currentYear = today.getFullYear();
    const currentMonth = String(today.getMonth() + 1).padStart(2, '0');
    const currentMonthKey = `${currentYear}-${currentMonth}`;

    const months = [];
    let y = 2026, m = 1;
    while (true) {
      const mk = `${y}-${String(m).padStart(2, '0')}`;
      months.push(mk);
      if (mk === currentMonthKey) break;
      m++;
      if (m > 12) { m = 1; y++; }
      // safety
      if (months.length > 36) break;
    }

    // Filter history sites consistent with current scope (country + site)
    const isAllSites = (CURRENT_SITE === 'all');
    const histSites = HISTORY_DATA && HISTORY_DATA.sites
      ? Object.values(HISTORY_DATA.sites).filter(s => {
          if (s.is_rollup) return false;
          if (!isAllSites) return s.name === CURRENT_SITE;
          if (CURRENT_COUNTRY === 'fr') return s.country === 'FR';
          if (CURRENT_COUNTRY === 'nl') return s.country === 'NL';
          return true;
        })
      : [];

    // Compute actual occupancy % per month (weighted by total_sqm across sites in scope)
    const actualByMonth = {};
    months.forEach(mk => {
      if (mk === currentMonthKey) {
        // Live data from FILTERED_DATA
        const r = FILTERED_DATA.reduce((s, d) => s + (d.occupancy?.rented_sqm || 0), 0);
        const t = FILTERED_DATA.reduce((s, d) => s + (d.occupancy?.total_sqm || 0), 0);
        actualByMonth[mk] = t > 0 ? (r / t * 100) : null;
      } else {
        let r = 0, t = 0;
        histSites.forEach(s => {
          const e = (s.series || []).find(x => x.month === mk);
          if (e?.occupancy) {
            r += e.occupancy.rented_sqm || 0;
            t += e.occupancy.total_sqm || 0;
          }
        });
        actualByMonth[mk] = t > 0 ? (r / t * 100) : null;
      }
    });

    // Compute budget % per month — weight each site's budgeted occupancy_pct by total_sqm
    const budgetByMonth = {};
    months.forEach(mk => {
      let weighted = 0, totSqm = 0;
      // Use sites in scope: prefer FILTERED_DATA for sqm weights (live), but if a site isn't in
      // FILTERED_DATA (e.g. historical-only scope), fall back to history's last total_sqm.
      const scopedSiteNames = isAllSites
        ? histSites.map(s => s.name)
        : [CURRENT_SITE];
      scopedSiteNames.forEach(siteName => {
        const key = siteKeyFromName(siteName);
        if (!key || !BUDGET_DATA) return;
        const mb = BUDGET_DATA.sites[key]?.[mk];
        if (mb?.occupancy_pct === null || mb?.occupancy_pct === undefined) return;
        // Sqm weighting: prefer FILTERED_DATA (live), else last known historical total_sqm
        const liveRow = FILTERED_DATA.find(d => d.site_name === siteName);
        let sqm = liveRow?.occupancy?.total_sqm || 0;
        if (!sqm) {
          const histSite = HISTORY_DATA?.sites?.[key];
          if (histSite?.series?.length) {
            sqm = histSite.series[histSite.series.length - 1]?.occupancy?.total_sqm || 0;
          }
        }
        if (sqm <= 0) return;
        weighted += (mb.occupancy_pct / 100) * sqm;
        totSqm += sqm;
      });
      budgetByMonth[mk] = totSqm > 0 ? (weighted / totSqm * 100) : null;
    });

    const monthLabels = months.map(mk => {
      const [yy, mm] = mk.split('-');
      const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const label = names[parseInt(mm, 10) - 1];
      const isMTD = (mk === currentMonthKey);
      return isMTD ? `${label} '${yy.slice(2)} MTD` : `${label} '${yy.slice(2)}`;
    });

    const actualData = months.map(mk => actualByMonth[mk]);
    const budgetData = months.map(mk => budgetByMonth[mk]);

    // Bar colors per performance bucket
    const barColors = actualData.map(v => {
      if (v === null || v === undefined) return '#e5e7eb';
      if (v >= 80) return '#16a34a';
      if (v >= 50) return '#f97316';
      return '#ef4444';
    });

    mkOccVsBudgetChart('ch-occ-vs-budget', monthLabels, actualData, budgetData, barColors);
  });
}

// Bar chart of actual occupancy % per month (colored by bucket) with a dashed
// budget line overlay. Budget rendered as a thin segment-line at the bar's top edge.
function mkOccVsBudgetChart(id, labels, actualData, budgetData, barColors) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (CHARTS[id]) CHARTS[id].destroy();

  // Per-month "budget marker" — a tiny horizontal bar drawn as a line at the budget level.
  // Implemented as a line dataset with thick top borders and no fill. We render it as a
  // dashed line connecting the budget points so you can see the trajectory too.

  CHARTS[id] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: 'Actual',
          data: actualData,
          backgroundColor: barColors,
          borderRadius: 4,
          borderSkipped: false,
          maxBarThickness: 56,

          pointBackgroundColor: '#fff',

          pointBorderWidth: 2,
          tension: 0,
          spanGaps: true,
          order: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,

        legend: { display: false },

          backgroundColor: '#fff',
          borderColor: '#e5e7eb',
          borderWidth: 1,
          titleColor: '#1a1a1a',
          bodyColor: '#1a1a1a',
          titleFont: { family: 'Inter', size: 11, weight: '600' },
          bodyFont: { family: 'Inter', size: 11 },
          padding: 10,
          callbacks: {
            label: (ctx) => {
              const v = ctx.parsed.y;
              if (v === null || v === undefined) return `${ctx.dataset.label}: —`;
              return `${ctx.dataset.label}: ${v.toFixed(1)}%`;
            }
          }

}

        <div style="display:flex;gap:14px;font-size:11px;color:var(--muted-2);align-items:center;flex-wrap:wrap">

    const currentMonthKey = `${currentYear}-${currentMonth}`;

        });

      }
    });

    // Budgeted revenue per month, summed across in-scope sites
    const budgetByMonth = {};
    months.forEach(mk => {
      let sum = 0;
      let anyBudget = false;
      const scopedSiteNames = isAllSites
        ? histSites.map(s => s.name)
        : [CURRENT_SITE];
      scopedSiteNames.forEach(siteName => {

          anyBudget = true;
        }
      });
      budgetByMonth[mk] = anyBudget ? sum : null;
    });

    const monthLabels = months.map(mk => {
      const [yy, mm] = mk.split('-');
      const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const label = names[parseInt(mm, 10) - 1];
      const isMTD = (mk === currentMonthKey);
      return isMTD ? `${label} '${yy.slice(2)} MTD` : `${label} '${yy.slice(2)}`;
    });

    const actualData = months.map(mk => actualByMonth[mk] || 0);
    const budgetData = months.map(mk => budgetByMonth[mk]);

    // Bar colors: bucket by % of budget achieved
    const barColors = months.map(mk => {
      const actual = actualByMonth[mk] || 0;
      const budget = budgetByMonth[mk];
      if (budget === null || budget === undefined || budget <= 0) return '#9ca3af';  // no budget = neutral gray
      const pct = (actual / budget) * 100;
      if (pct >= 100) return '#16a34a';
      if (pct >= 80) return '#f97316';
      return '#ef4444';
    });

    mkRevVsBudgetChart('ch-rev-vs-budget', monthLabels, actualData, budgetData, barColors);
  });
}

// Bar chart of actual revenue per month (colored by % of budget achieved) with

  const canvas = document.getElementById(id);

  const maxVal = allVals.length > 0 ? Math.max(...allVals) : 0;
  const yMax = maxVal > 0 ? Math.ceil(maxVal * 1.15 / 1000) * 1000 : 1000;

  CHARTS[id] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          type: 'bar',

          maxBarThickness: 56,
          order: 2
        },
        {
          type: 'line',
          label: 'Budget',
          data: budgetData,
          borderColor: '#1a1a1a',
          borderWidth: 2,
          borderDash: [6, 4],
          backgroundColor: 'transparent',
          pointRadius: 4,
          pointBackgroundColor: '#fff',
          pointBorderColor: '#1a1a1a',
          pointBorderWidth: 2,
          tension: 0,
          spanGaps: true,
          order: 1
        }
      ]
    },
    options: {
      responsive: true,

      plugins: {
        legend: { display: false },

          backgroundColor: '#fff',
          borderColor: '#e5e7eb',
          borderWidth: 1,
          titleColor: '#1a1a1a',
          bodyColor: '#1a1a1a',
          titleFont: { family: 'Inter', size: 11, weight: '600' },
          bodyFont: { family: 'Inter', size: 11 },
          padding: 10,
          callbacks: {
            label: (ctx) => {
              const v = ctx.parsed.y;

              return `${ctx.dataset.label}: ${fmtEur(v)}`;

          ticks: { color: '#9ca3af', font: { family: 'Inter', size: 11 } },

          min: 0,
          max: yMax,

            color: '#9ca3af',

            callback: v => '€' + fmt(v / 1000, 0) + 'k'

          grid: { color: '#f3f4f6', drawBorder: false }
        }
      }
    }
  });
}

// Simple CSV parser — assumes no quoted commas, trims whitespace
// String columns: date-like, and known text columns used across tabs.
// Any value that fails to parse as a finite number also falls back to the raw string.
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers: [], rows: [] };
  let headers = lines[0].split(',').map(h => h.trim());
  // Strip trailing empty headers (Excel exports often pad with empty columns)
  while (headers.length > 0 && headers[headers.length - 1] === '') headers.pop();
  const stringCols = new Set([
    'date', 'Date',
    'Store', 'Company',
    // SiteWare
    'Site Name', 'Template Name', 'Audit Title', 'Audit Grade',
    'In Progress %', 'Completed %'
  ]);
  const rows = lines.slice(1).map(line => {
    const cells = line.split(',').map(c => c.trim());
    const row = {};
    headers.forEach((h, i) => {
      const raw = cells[i];
      if (stringCols.has(h)) {
        row[h] = raw || '';
      } else {
        if (raw === undefined || raw === '') {
          row[h] = 0;
        } else {
          const n = Number(raw);
          row[h] = Number.isFinite(n) ? n : raw;
        }
      }
    });
    return row;
  }).filter(r => {
    // Drop fully-empty rows
    return Object.values(r).some(v => v !== '' && v !== 0);
  });
  return { headers, rows };
}

// Parse date string — supports both YYYY-MM-DD and M/D/YYYY formats
function parseSpDate(s) {
  if (!s) return null;
  const str = String(s).trim();
  // YYYY-MM-DD
  let m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) return { year: Number(m[1]), month: Number(m[2]), day: Number(m[3]) };
  // M/D/YYYY
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return { year: Number(m[3]), month: Number(m[1]), day: Number(m[2]) };
  return null;
}

// Filter rows to April 2026 through today (MTD semantics)
function filterToAprilMTD(rows) {
  const today = new Date();
  const todayYear = today.getFullYear();
  const todayMonth = today.getMonth() + 1;
  const todayDay = today.getDate();

  return rows.filter(r => {
    const d = parseSpDate(r.date);
    if (!d) return false;
    if (d.year !== 2026 || d.month !== 4) return false;
    // Keep days <= today if we're in April; keep all April days if we're past April
    if (todayYear === 2026 && todayMonth === 4) {
      return d.day <= todayDay;
    }
    return todayYear > 2026 || (todayYear === 2026 && todayMonth > 4);
  });
}

async function loadStoragePilotData() {
  const files = [
    { key: 'byLocation', path: 'data/sp/conversations_by_location.csv' },
    { key: 'byCategory', path: 'data/sp/conversations_by_category.csv' },
    { key: 'escalationsByCategory', path: 'data/sp/escalations_by_category.csv' },
    { key: 'escalationsByLocation', path: 'data/sp/escalations_by_location.csv' }
  ];

  await Promise.all(files.map(async (f) => {
    try {
      const resp = await fetch(f.path + '?t=' + Date.now(), { cache: 'no-store' });
      if (!resp.ok) { SP_DATA[f.key] = null; return; }
      const text = await resp.text();
      SP_DATA[f.key] = parseCSV(text);
    } catch (e) {
      console.log(`StoragePilot: failed to load ${f.path}:`, e.message);
      SP_DATA[f.key] = null;
    }
  }));
}

// Parse a percent string like "40.63 %" or "40.63%" or "40.63" into a number
function parseSwPct(v) {
  if (v === null || v === undefined || v === '') return 0;
  const s = String(v).replace('%', '').trim();
  const n = Number(s);
  return isNaN(n) ? 0 : n;
}

// Normalize a grade string ("Grade F", "F", " grade  f ") → "F" / "A" / ...
function parseSwGrade(v) {
  if (!v) return '—';
  const s = String(v).toUpperCase().replace('GRADE', '').trim();
  if (['A', 'B', 'C', 'D', 'F'].includes(s)) return s;
  return '—';
}

function swGradeColor(g) {
  switch (g) {
    case 'A': return '#16a34a';   // green
    case 'B': return '#3b82f6';   // blue
    case 'C': return '#f59e0b';   // yellow/amber
    case 'D': return '#f97316';   // orange
    case 'F': return '#ef4444';   // red
    default:  return '#6b7280';   // gray for missing
  }
}

function swGradeBadge(g, size) {
  const color = swGradeColor(g);
  const bg = color + '22';  // light tint
  const px = size === 'lg' ? 'font-size:42px;padding:14px 22px' : 'font-size:13px;padding:3px 10px';
  return `<span style="display:inline-block;font-weight:700;border-radius:8px;background:${bg};color:${color};${px}">${g}</span>`;
}

// Match CURRENT_SITE to a SiteWare row (reuses StoragePilot's matcher approach)
function matchSwRow(rows, siteName) {
  if (!rows || !siteName) return null;
  const normalize = s => String(s || '')
    .toLowerCase()
    .replace(/^1box\s+/i, '')
    .trim();
  const target = normalize(siteName);
  return rows.find(r => {
    const csvNorm = normalize(r['Site Name']);
    const aliased = STORE_ALIASES[csvNorm] || csvNorm;
    return aliased === target;
  }) || null;
}
