// Match a CURRENT_SITE value (e.g. '1BOX Breda') to a Store entry in the
// per-store category CSV (e.g. 'Breda'). Case-insensitive, strips a leading
// '1BOX '/'1Box ' prefix from the site name before comparing.
//
// STORE_ALIASES covers cases where the StoragePilot CSV's store name differs
// from the dashboard's site_name. Map key = normalized CSV store name,
// value = normalized dashboard site name (after stripping 1BOX/1Box prefix).
const STORE_ALIASES = {
  'den bosch': "'s-hertogenbosch",
  'amsterdam': 'amsterdam-schepenbergweg',
  'heerlen heerlerbaan': 'heerlen-heerlerbaan',
  'nijmegen wijchen': 'nijmegen-wijchen'
};

function matchStoreRow(storeRows, siteName) {
  if (!storeRows || !siteName) return null;
  const normalize = s => String(s || '')
    .toLowerCase()
    .replace(/^1box\s+/i, '')
    .trim();
  const target = normalize(siteName);
  return storeRows.find(r => {
    const csvNorm = normalize(r.Store);
    const aliased = STORE_ALIASES[csvNorm] || csvNorm;
    return aliased === target;
  }) || null;
}

function renderStoragePilot() {
  const panel = document.getElementById('panel-storagepilot');
  if (!panel) return;

  // Per-store view: 3 KPI cards summing daily location data
  if (CURRENT_SITE !== 'all') {
    renderStoragePilotStore(panel);
    return;
  }

  // Portfolio (All Sites) view continues below — gated to Netherlands
  if (CURRENT_COUNTRY !== 'nl') {
    panel.innerHTML = `
      <div class="empty-state">
        <div class="big">🇳🇱</div>
        <p>StoragePilot data is available for the Netherlands portfolio only.<br>
        Select <strong>Netherlands</strong> to view.</p>
      </div>
    `;
    return;
  }

  if (!SP_DATA.byCategory) {
    panel.innerHTML = `
      <div class="empty-state">
        <div class="big">💬</div>
        <p>StoragePilot data not yet loaded.<br>
        Upload CSVs to <code>data/sp/</code> in the repo.</p>
      </div>
    `;
    return;
  }

  // Helper: group rows by month, summing category columns. Includes ALL categories
  // (including 'ignore') so KPI totals and escalation-rate denominators are complete.
  // The bar chart filters out 'ignore' separately because it would dwarf other bars.
  function bucketByMonth(rows, headers) {
    const catHeaders = headers.filter(h => h !== 'date' && h !== 'total');
    const byMonth = {};  // {'2026-04': {category: total, ...}, '2026-05': {...}}
    rows.forEach(r => {
      const d = parseSpDate(r.date);
      if (!d) return;
      const mk = `${d.year}-${String(d.month).padStart(2, '0')}`;
      if (!byMonth[mk]) {
        byMonth[mk] = {};
        catHeaders.forEach(h => { byMonth[mk][h] = 0; });
      }
      catHeaders.forEach(h => { byMonth[mk][h] += (Number(r[h]) || 0); });
    });
    return { catHeaders, byMonth };
  }

  // Helper: convert "sales_inquiry" -> "Sales Inquiry"
  function prettyCategory(h) {
    return h.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  // Convert YYYY-MM to "Apr" / "May" etc.
  function monthLabel(mk) {
    const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const [y, m] = mk.split('-');
    return names[parseInt(m, 10) - 1] + (y !== '2026' ? ` '${y.slice(2)}` : '');
  }

  // Conversations
  const convBucket = bucketByMonth(SP_DATA.byCategory.rows, SP_DATA.byCategory.headers);
  const convMonthsAll = Object.keys(convBucket.byMonth).sort();
  // Only include months with non-zero activity
  const convMonths = convMonthsAll.filter(mk =>
    convBucket.catHeaders.some(h => (convBucket.byMonth[mk][h] || 0) > 0)
  );

  // Escalations (same structure)
  let escMonths = [], escBucket = null;
  if (SP_DATA.escalationsByCategory && SP_DATA.escalationsByCategory.rows.length) {
    escBucket = bucketByMonth(SP_DATA.escalationsByCategory.rows, SP_DATA.escalationsByCategory.headers);
    const escMonthsAll = Object.keys(escBucket.byMonth).sort();
    escMonths = escMonthsAll.filter(mk =>
      escBucket.catHeaders.some(h => (escBucket.byMonth[mk][h] || 0) > 0)
    );
  }

  // KPIs: reflect current month (most recent month with data)
  const currentMonth = convMonths.length > 0 ? convMonths[convMonths.length - 1] : null;
  let totalConv = 0, topCategory = '—', topCount = 0, daysInMonth = 0, avgPerDay = 0;
  if (currentMonth) {
    const monthData = convBucket.byMonth[currentMonth];
    convBucket.catHeaders.forEach(h => { totalConv += monthData[h] || 0; });
    // Top category for current month — exclude 'ignore' since it dominates
    // and isn't a meaningful "top topic"
    const sorted = convBucket.catHeaders
      .filter(h => h !== 'ignore')
      .map(h => ({ h, total: monthData[h] || 0 }))
      .sort((a, b) => b.total - a.total);
    if (sorted[0] && sorted[0].total > 0) {
      topCategory = prettyCategory(sorted[0].h);
      topCount = sorted[0].total;
    }
    // Days in current month (count of distinct date entries in that month with any activity)
    daysInMonth = SP_DATA.byCategory.rows.filter(r => {
      const d = parseSpDate(r.date);
      if (!d) return false;
      const mk = `${d.year}-${String(d.month).padStart(2, '0')}`;
      if (mk !== currentMonth) return false;
      return convBucket.catHeaders.some(h => (Number(r[h]) || 0) > 0);
    }).length;
    avgPerDay = daysInMonth > 0 ? (totalConv / daysInMonth) : 0;
  }

  // Total escalations for current month (for the subtitle under the escalations chart
  // AND for the new Escalation Rate KPI card)
  let totalEsc = 0;
  if (escBucket && currentMonth && escBucket.byMonth[currentMonth]) {
    escBucket.catHeaders.forEach(h => { totalEsc += escBucket.byMonth[currentMonth][h] || 0; });
  }

  const escRate = totalConv > 0 ? (totalEsc / totalConv * 100) : 0;

  const currentMonthDisplay = currentMonth ? monthLabel(currentMonth) : '—';

  panel.innerHTML = `
    <div class="grid-3" style="margin-bottom:12px">
      <div class="stat-card" style="text-align:center">
        <div class="label">TOTAL CONVERSATIONS</div>
        <div class="value">${fmt(totalConv)}</div>
        <div class="sub">${currentMonthDisplay} • ${daysInMonth} days</div>
      </div>
      <div class="stat-card" style="text-align:center">
        <div class="label">TOP CATEGORY</div>
        <div class="value" style="font-size:20px">${topCategory}</div>
        <div class="sub">${topCount > 0 ? fmt(topCount) + ' conversations' : ''}</div>
      </div>
      <div class="stat-card" style="text-align:center">
        <div class="label">ESCALATION RATE</div>
        <div class="value ${escRate >= 60 ? 'red' : (escRate >= 40 ? 'amber' : 'green')}">${escBucket ? fmt(escRate, 1) + '%' : '—'}</div>
        <div class="sub">${escBucket ? fmt(totalEsc) + ' of ' + fmt(totalConv) + ' calls' : 'Escalation data not loaded'}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div class="card-title">Conversations by Category (Monthly Comparison)</div>
      <div style="position:relative;height:380px"><canvas id="ch-sp-category-mom"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">Escalations by Category (Monthly Comparison)</div>
      ${escMonths.length > 0
        ? `<div style="position:relative;height:380px"><canvas id="ch-sp-escalations-mom"></canvas></div>
           <div style="font-size:11px;color:var(--muted-2);margin-top:8px;text-align:center">${currentMonthDisplay}: ${fmt(totalEsc)} total escalations</div>`
        : `<div style="display:flex;align-items:center;justify-content:center;height:380px;color:var(--muted-2);font-size:12px">No escalation data available</div>`
      }
    </div>

    ${escBucket ? `
    <div class="section-gap"></div>
    <div class="card" style="max-width:560px">
      <div class="card-title">Escalation Rate by Month</div>
      <div style="position:relative;height:240px"><canvas id="ch-sp-esc-rate"></canvas></div>
    </div>
    ` : ''}
  `;

  nextTick(() => {
    mkMomCategoryChart('ch-sp-category-mom', convBucket, convMonths, prettyCategory, monthLabel);
    if (escMonths.length > 0 && escBucket) {
      mkMomCategoryChart('ch-sp-escalations-mom', escBucket, escMonths, prettyCategory, monthLabel);
    }
    // Escalation rate per month: total escalations / total conversations (full
    // totals including 'ignore' for both, to keep the rate apples-to-apples)
    if (escBucket) {
      const ratesByMonth = convMonths.map(mk => {
        let conv = 0, esc = 0;
        convBucket.catHeaders.forEach(h => { conv += convBucket.byMonth[mk]?.[h] || 0; });
        if (escBucket.byMonth[mk]) {
          escBucket.catHeaders.forEach(h => { esc += escBucket.byMonth[mk][h] || 0; });
        }
        return { mk, conv, esc, rate: conv > 0 ? (esc / conv * 100) : 0 };
      });
      mkEscRateChart('ch-sp-esc-rate', ratesByMonth, monthLabel);
    }
  });
}

// Small vertical bar chart of monthly escalation rates. Bars colored by rate
// (green <40%, amber 40-60%, red ≥60%) with the % shown above each bar.
function mkEscRateChart(canvasId, ratesByMonth, monthLabel) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (CHARTS[canvasId]) CHARTS[canvasId].destroy();

  const labels = ratesByMonth.map(r => monthLabel(r.mk));
  const data = ratesByMonth.map(r => r.rate);
  const colors = ratesByMonth.map(r =>
    r.rate >= 60 ? '#ef4444' : r.rate >= 40 ? '#f97316' : '#16a34a'
  );

  // Compute y-max with some headroom but cap at 100
  const maxVal = Math.max(...data, 0);
  const yMax = Math.min(100, Math.ceil((maxVal + 10) / 10) * 10);

  CHARTS[canvasId] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderRadius: 4,
        maxBarThickness: 64
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#e5e7eb',
          borderWidth: 1,
          titleColor: '#1a1a1a',
          bodyColor: '#1a1a1a',
          titleFont: { family: 'Inter', size: 11, weight: '600' },
          bodyFont: { family: 'Inter', size: 11 },
          padding: 10,
          callbacks: {
            label: (ctx) => {
              const r = ratesByMonth[ctx.dataIndex];
              return [`Rate: ${r.rate.toFixed(1)}%`, `${r.esc} escalations of ${r.conv} conversations`];
            }
          }
        },
        // Custom label-above-bar plugin via afterDatasetsDraw
      },
      scales: {
        x: {
          ticks: { color: '#6b7280', font: { family: 'Inter', size: 12 } },
          grid: { display: false }
        },
        y: {
          beginAtZero: true,
          max: yMax,
          ticks: {
            color: '#9ca3af',
            font: { family: 'Inter', size: 10 },
            callback: v => v + '%'
          },
          grid: { color: '#f3f4f6', drawBorder: false }
        }
      },
      animation: { duration: 600 }
    },
    plugins: [{
      id: 'rateLabels',
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        const meta = chart.getDatasetMeta(0);
        ctx.save();
        ctx.font = '600 13px Inter, sans-serif';
        ctx.fillStyle = '#1a1a1a';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        meta.data.forEach((bar, i) => {
          const val = data[i];
          ctx.fillText(val.toFixed(1) + '%', bar.x, bar.y - 6);
        });
        ctx.restore();
      }
    }]
  });
}

// Grouped vertical bar chart: categories on x-axis, one dataset per month.
// Used for both Conversations-by-Category and Escalations-by-Category month-over-month
// comparison on the StoragePilot All Sites tab.
function mkMomCategoryChart(canvasId, bucket, months, prettyCategory, monthLabel) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (CHARTS[canvasId]) CHARTS[canvasId].destroy();

  // Exclude 'ignore' from the displayed bars — it represents auto-resolved /
  // non-meaningful conversations and dwarfs the real categories visually.
  const displayCats = bucket.catHeaders.filter(h => h !== 'ignore');

  // Order categories by total across all months (highest first)
  const catTotals = displayCats.map(h => ({
    raw: h,
    total: months.reduce((s, m) => s + (bucket.byMonth[m]?.[h] || 0), 0)
  })).filter(c => c.total > 0).sort((a, b) => b.total - a.total);

  const labels = catTotals.map(c => prettyCategory(c.raw));

  // Color palette per month (cycling, with the most recent month getting accent colors)
  const monthColors = ['#16a34a', '#3b82f6', '#f97316', '#8b5cf6', '#ef4444', '#06b6d4', '#ec4899'];

  const datasets = months.map((mk, i) => ({
    label: monthLabel(mk),
    data: catTotals.map(c => bucket.byMonth[mk]?.[c.raw] || 0),
    backgroundColor: monthColors[i % monthColors.length],
    borderRadius: 3,
    maxBarThickness: 36
  }));

  CHARTS[canvasId] = new Chart(canvas, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
          align: 'end',
          labels: { font: { family: 'Inter', size: 11 }, color: '#6b7280', boxWidth: 12, boxHeight: 12 }
        },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#e5e7eb',
          borderWidth: 1,
          titleColor: '#1a1a1a',
          bodyColor: '#1a1a1a',
          titleFont: { family: 'Inter', size: 11, weight: '600' },
          bodyFont: { family: 'Inter', size: 11 },
          padding: 10
        }
      },
      scales: {
        x: {
          ticks: { color: '#9ca3af', font: { family: 'Inter', size: 11 } },
          grid: { display: false }
        },
        y: {
          beginAtZero: true,
          ticks: { color: '#9ca3af', font: { family: 'Inter', size: 10 } },
          grid: { color: '#f3f4f6', drawBorder: false }
        }
      }
    }
  });
}

// Match dashboard's CURRENT_SITE (e.g. "1BOX Boxtel") to a column name in
// the StoragePilot daily location CSVs (e.g. "Boxtel"). Handles common
// spelling/casing variations.
function findSpLocationColumn(headers, siteName) {
  if (!headers || !siteName) return null;
  // Strip leading "1BOX" prefix and whitespace
  const clean = siteName.replace(/^1BOX\s*/i, '').trim().toLowerCase();
  // Try exact match first
  for (const h of headers) {
    if (h.toLowerCase() === clean) return h;
  }
  // Try normalized match (remove dashes, extra spaces)
  const norm = s => s.toLowerCase().replace(/[-\s]+/g, ' ').trim();
  const cleanN = norm(clean);
  for (const h of headers) {
    if (norm(h) === cleanN) return h;
  }
  // Try alias map for known mismatches
  const aliases = {
    "'s-hertogenbosch": "Den Bosch",
    "amsterdam-schepenbergweg": "Amsterdam",
    "helmond kanaaldijk": "Helmond kanaaldijk"
  };
  if (aliases[clean]) {
    for (const h of headers) {
      if (h === aliases[clean]) return h;
    }
  }
  return null;
}

// ─────────────────────────────────────────────
// COMPETITOR RATES (StorTrack daily pull)
// ─────────────────────────────────────────────
// CSVs at data/competitors/<site_key>.csv with one row per day:
//   date, 1box_rate, shurgard_rate, allsafe_rate, other_rate, ...
// The puller (fetch_competitor_rates.py) writes these daily; the dashboard
// reads them and renders a line chart on the Trends tab for per-site NL views.
const COMPETITOR_CACHE = {};

async function loadCompetitorCsv(siteKey) {
  if (!siteKey) return null;
  if (COMPETITOR_CACHE[siteKey] !== undefined) return COMPETITOR_CACHE[siteKey];

  try {
    const resp = await fetch(`data/competitors/${siteKey}.csv?t=${Date.now()}`, { cache: 'no-store' });
    if (!resp.ok) {
      COMPETITOR_CACHE[siteKey] = null;
      return null;
    }
    const text = (await resp.text()).trim();
    if (!text) { COMPETITOR_CACHE[siteKey] = null; return null; }
    const parsed = parseCSV(text);
    if (!parsed.rows.length) { COMPETITOR_CACHE[siteKey] = null; return null; }
    COMPETITOR_CACHE[siteKey] = parsed;
    return parsed;
  } catch (e) {
    console.log(`Competitor: failed to load ${siteKey}:`, e.message);
    COMPETITOR_CACHE[siteKey] = null;
    return null;
  }
}

function injectCompetitorChart(siteKey) {
  const slot = document.getElementById('trends-competitor-slot');
  if (!slot) return;

  // Show placeholder card while we fetch
  slot.innerHTML = `
    <div class="section-gap"></div>
    <div class="card" id="comp-rate-card" style="opacity:0.6">
      <div class="card-title">Competitor Rates — €/m² by Store (5 km radius)</div>
      <div class="chart-wrap-lg" style="display:flex;align-items:center;justify-content:center;color:var(--muted-2);font-size:12px">Loading…</div>
    </div>
  `;

  loadCompetitorCsv(siteKey).then(data => {
    const card = document.getElementById('comp-rate-card');
    if (!card) return;

    if (!data || !data.rows.length) {
      card.style.opacity = '1';
      card.innerHTML = `
        <div class="card-title">Competitor Rates — €/m² by Store (5 km radius)</div>
        <div class="chart-wrap-lg" style="display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted-2);font-size:12px;text-align:center;padding:20px">
          <div style="font-size:32px;margin-bottom:10px;opacity:0.4">📊</div>
          <div>No competitor data yet for this site.</div>
          <div style="margin-top:6px">Run <code>fetch_competitor_rates.py</code> daily; chart appears once data accumulates.</div>
        </div>
      `;
      return;
    }

    // Long-format rows: { date, brand, store_label, store_id, rate, unit_count }
    // Build:
    //   - Sorted unique dates (x-axis)
    //   - Per-store time series (y-values keyed by date)
    const allDates = [...new Set(data.rows.map(r => String(r.date)))].sort();

    // Group rows by store_id (preferred — labels can drift, ids are stable)
    const stores = {};
    for (const r of data.rows) {
      const id = String(r.store_id || r.store_label || '');
      if (!id) continue;
      const rate = Number(r.rate);
      if (!Number.isFinite(rate)) continue;
      if (!stores[id]) {
        stores[id] = {
          brand: String(r.brand || 'other').toLowerCase(),
          // Use the most recent label seen for this store id
          label: String(r.store_label || id),
          byDate: {}
        };
      } else {
        stores[id].label = String(r.store_label || stores[id].label);
      }
      stores[id].byDate[String(r.date)] = rate;
    }

    // Drop "other" entirely (puller already filters, but defensive)
    const storeList = Object.entries(stores)
      .map(([id, s]) => ({ id, ...s }))
      .filter(s => s.brand === '1box' || s.brand === 'shurgard' || s.brand === 'allsafe');

    if (!storeList.length) {
      card.style.opacity = '1';
      card.innerHTML = `
        <div class="card-title">Competitor Rates — €/m² by Store (5 km radius)</div>
        <div class="chart-wrap-lg" style="display:flex;align-items:center;justify-content:center;color:var(--muted-2);font-size:12px">No 1Box / Shurgard / AllSafe data parsed.</div>
      `;
      return;
    }

    // Sort: 1box first, then shurgard, then allsafe; within each, alphabetical by label
    const brandOrder = { '1box': 0, 'shurgard': 1, 'allsafe': 2 };
    storeList.sort((a, b) =>
      (brandOrder[a.brand] - brandOrder[b.brand]) || a.label.localeCompare(b.label)
    );

    // Color palettes per brand. 1BOX = thick green; Shurgard = blues; AllSafe = oranges.
    const SHURGARD_PALETTE = ['#1d4ed8', '#3b82f6', '#60a5fa', '#93c5fd', '#1e40af'];
    const ALLSAFE_PALETTE  = ['#c2410c', '#ea580c', '#f97316', '#fb923c', '#fdba74'];
    const ONE_BOX_COLOR    = '#16a34a';

    let shurgardIdx = 0, allsafeIdx = 0;
    const datasets = storeList.map(s => {
      const data = allDates.map(d => (d in s.byDate ? s.byDate[d] : null));
      let color, lineWidth;
      if (s.brand === '1box') {
        color = ONE_BOX_COLOR;
        lineWidth = 3;
      } else if (s.brand === 'shurgard') {
        color = SHURGARD_PALETTE[shurgardIdx++ % SHURGARD_PALETTE.length];
        lineWidth = 1.5;
      } else {
        color = ALLSAFE_PALETTE[allsafeIdx++ % ALLSAFE_PALETTE.length];
        lineWidth = 1.5;
      }
      return { label: s.label, data, color, lineWidth };
    });

    // Build x-axis labels from dates
    const labels = allDates.map(d => {
      const parts = d.split('-');
      if (parts.length === 3) {
        const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return names[parseInt(parts[1],10)-1] + ' ' + parseInt(parts[2],10);
      }
      return d;
    });

    const dayCount = allDates.length;
    const dayWord = dayCount === 1 ? 'day' : 'days';
    const storeWord = storeList.length === 1 ? 'store' : 'stores';

    card.style.opacity = '1';
    card.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div class="card-title" style="margin-bottom:0">Competitor Rates — €/m² by Store (5 km radius)</div>
        <div style="font-size:11px;color:var(--muted-2)">${storeList.length} ${storeWord} · ${dayCount} ${dayWord} of history</div>
      </div>
      <div style="max-width:760px;margin:0 auto">
        <div class="chart-wrap-lg"><canvas id="ch-comp-rate"></canvas></div>
      </div>
    `;

    nextTick(() => {
      mkLineChart('ch-comp-rate', labels, datasets, {
        yFmt: v => '€' + fmt(v, 2),
        yMin: 0
      });
    });
  });
}

function renderTrends() {
  const panel = document.getElementById('panel-trends');
  if (!panel) return;

  let scopeLabel;
  if (CURRENT_SITE !== 'all') scopeLabel = siteShort(CURRENT_SITE);
  else if (CURRENT_COUNTRY === 'fr') scopeLabel = 'France';
  else if (CURRENT_COUNTRY === 'nl') scopeLabel = 'Netherlands';
  else scopeLabel = 'Portfolio';

  if (!HISTORY_DATA || !HISTORY_DATA.sites) {
    panel.innerHTML = `
      <div class="trends-header">
        <div class="trends-scope">${scopeLabel} — no data</div>
      </div>
      <div class="empty-state">
        <div class="big">📈</div>
        <p>No historical data available.<br>Run <code>backfill_historicals.py</code> to generate <code>data/history.json</code>.</p>
      </div>
    `;
    return;
  }

  const isAllSites = (CURRENT_SITE === 'all');
  const filteredSiteEntries = Object.values(HISTORY_DATA.sites).filter(site => {
    if (site.is_rollup) {
      if (!isAllSites && site.name === CURRENT_SITE) return true;
      return false;
    }
    if (!isAllSites) return site.name === CURRENT_SITE;
    if (CURRENT_COUNTRY === 'fr') return site.country === 'FR';
    if (CURRENT_COUNTRY === 'nl') return site.country === 'NL';
    return true;
  });

  if (filteredSiteEntries.length === 0) {
    panel.innerHTML = `
      <div class="trends-header">
        <div class="trends-scope">${scopeLabel} — no data</div>
      </div>
      <div class="empty-state">
        <div class="big">📈</div>
        <p>No historical data for this selection.</p>
      </div>
    `;
    return;
  }

  const monthSet = new Set();
  filteredSiteEntries.forEach(s => (s.series || []).forEach(e => monthSet.add(e.month)));

  // Add current month from latest.json as a provisional MTD data point,
  // but only if history.json doesn't already have an entry for it
  const currentMonth = getCurrentMonthKey();
  const currentMonthInHistory = monthSet.has(currentMonth);
  if (!currentMonthInHistory && RAW_DATA.length > 0) {
    monthSet.add(currentMonth);
  }

  const months = [...monthSet].sort();
  const monthLabels = months.map(m => {
    const [y, mo] = m.split('-');
    const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return names[parseInt(mo,10)-1] + ' ' + y;
  });

  // Which months are MTD (incomplete)? Only the current month when pulled from live data.
  const mtdMonths = new Set();
  if (!currentMonthInHistory) mtdMonths.add(currentMonth);

  panel.innerHTML = `
    <div class="trends-header">
      <div class="trends-scope">${scopeLabel} — ${months.length} data point${months.length === 1 ? '' : 's'} (monthly${mtdMonths.size > 0 ? ', current MTD' : ''})</div>
      <div class="toggle-group">
        <button class="toggle-btn ${TRENDS_VIEW === 'portfolio' ? 'active' : ''}" onclick="setTrendsView('portfolio')">Portfolio</button>
        <button class="toggle-btn ${TRENDS_VIEW === 'bystore' ? 'active' : ''}" onclick="setTrendsView('bystore')">By Store</button>
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Occupancy</div>
        <div class="chart-wrap-lg"><canvas id="ch-trend-occ"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Revenue</div>
        <div class="chart-wrap-lg"><canvas id="ch-trend-rev"></canvas></div>
      </div>
    </div>
    <div class="section-gap"></div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Net Rentals</div>
        <div class="chart-wrap-lg"><canvas id="ch-trend-net"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Avg Rate/m²</div>
        <div class="chart-wrap-lg"><canvas id="ch-trend-rate"></canvas></div>
      </div>
    </div>
    <div id="trends-competitor-slot"></div>
  `;

  // Per-site NL: async-load competitor rates and inject below the 4 trend charts
  if (!isAllSites && filteredSiteEntries.length === 1 && filteredSiteEntries[0].country === 'NL') {
    const siteKey = filteredSiteEntries[0].site_key;
    if (siteKey) injectCompetitorChart(siteKey);
  }

  nextTick(() => {
    if (TRENDS_VIEW === 'portfolio') {
      // Aggregated series
      const occSeries = [], revSeries = [], netSeries = [], rateSeries = [];
      months.forEach(m => {
        // For the current month (MTD), pull from live FILTERED_DATA
        if (m === currentMonth && !currentMonthInHistory) {
          let rSqm = 0, tSqm = 0, rev = 0, net = 0, rateNum = 0, rateDen = 0;
          FILTERED_DATA.forEach(d => {
            rSqm += d.occupancy?.rented_sqm || 0;
            tSqm += d.occupancy?.total_sqm || 0;
            rev += d.revenue?.net_total || 0;
            net += netNetFromRow(d, 'month');
            const rate = d.revenue?.avg_rate_per_sqm || 0;
            const sqm = d.occupancy?.rented_sqm || 0;
            if (rate && sqm) { rateNum += rate * sqm; rateDen += sqm; }
          });
          occSeries.push(tSqm > 0 ? (rSqm/tSqm*100) : null);
          revSeries.push(rev);
          netSeries.push(net);
          rateSeries.push(rateDen > 0 ? (rateNum/rateDen) : null);
          return;
        }

        let rSqm = 0, tSqm = 0, rev = 0, net = 0, rateNum = 0, rateDen = 0;
        filteredSiteEntries.forEach(s => {
          const e = (s.series || []).find(x => x.month === m);
          if (!e) return;
          rSqm += e.occupancy?.rented_sqm || 0;
          tSqm += e.occupancy?.total_sqm || 0;
          rev += e.revenue?.net_total || 0;
          net += netNetFromHist(e);
          if (e.revenue?.avg_rate_per_sqm && e.occupancy?.rented_sqm) {
            rateNum += e.revenue.avg_rate_per_sqm * e.occupancy.rented_sqm;
            rateDen += e.occupancy.rented_sqm;
          }
        });
        occSeries.push(tSqm > 0 ? (rSqm/tSqm*100) : null);
        revSeries.push(rev);
        netSeries.push(net);
        rateSeries.push(rateDen > 0 ? (rateNum/rateDen) : null);
      });

      mkLineChart('ch-trend-occ', monthLabels, [{ label: scopeLabel, data: occSeries, color: '#16a34a' }],
        { yFmt: v => v + '%', yMin: 0, yMax: 100, stepSize: 25, mtdMonths, months });
      mkLineChart('ch-trend-rev', monthLabels, [{ label: scopeLabel, data: revSeries, color: '#16a34a' }],
        { yFmt: v => '€' + (v/1000).toFixed(0) + 'k', yMin: 0, mtdMonths, months });
      mkLineChart('ch-trend-net', monthLabels, [{ label: scopeLabel, data: netSeries, color: '#f97316' }],
        { yFmt: v => v, mtdMonths, months });
      mkLineChart('ch-trend-rate', monthLabels, [{ label: scopeLabel, data: rateSeries, color: '#8b5cf6' }],
        { yFmt: v => '€' + fmt(v, 0), yMin: 0, mtdMonths, months });
    } else {
      // By Store: one line per site
      const palette = ['#16a34a', '#f97316', '#8b5cf6', '#3b82f6', '#ef4444', '#f59e0b', '#10b981', '#6366f1', '#ec4899', '#14b8a6'];
      const occDatasets = [], revDatasets = [], netDatasets = [], rateDatasets = [];

      filteredSiteEntries.forEach((s, i) => {
        const color = palette[i % palette.length];

        // For current month, find matching live site data
        const liveSite = !currentMonthInHistory
          ? FILTERED_DATA.find(d => d.site_name === s.name)
          : null;

        const occData = months.map(m => {
          if (m === currentMonth && liveSite) {
            const ts = liveSite.occupancy?.total_sqm || 0;
            return ts > 0 ? ((liveSite.occupancy.rented_sqm / ts) * 100) : null;
          }
          const e = (s.series || []).find(x => x.month === m);
          if (!e || !e.occupancy) return null;
          const ts = e.occupancy.total_sqm || 0;
          return ts > 0 ? ((e.occupancy.rented_sqm / ts) * 100) : null;
        });
        const revData = months.map(m => {
          if (m === currentMonth && liveSite) return liveSite.revenue?.net_total || null;
          const e = (s.series || []).find(x => x.month === m);
          return e?.revenue?.net_total || null;
        });
        const netData = months.map(m => {
          if (m === currentMonth && liveSite) return netNetFromRow(liveSite, 'month');
          const e = (s.series || []).find(x => x.month === m);
          return e ? netNetFromHist(e) : null;
        });
        const rateData = months.map(m => {
          if (m === currentMonth && liveSite) return liveSite.revenue?.avg_rate_per_sqm || null;
          const e = (s.series || []).find(x => x.month === m);
          return e?.revenue?.avg_rate_per_sqm || null;
        });

        occDatasets.push({ label: siteShort(s.name), data: occData, color });
        revDatasets.push({ label: siteShort(s.name), data: revData, color });
        netDatasets.push({ label: siteShort(s.name), data: netData, color });
        rateDatasets.push({ label: siteShort(s.name), data: rateData, color });
      });

      mkLineChart('ch-trend-occ', monthLabels, occDatasets, { yFmt: v => v + '%', yMin: 0, yMax: 100, stepSize: 25, mtdMonths, months });
      mkLineChart('ch-trend-rev', monthLabels, revDatasets, { yFmt: v => '€' + (v/1000).toFixed(0) + 'k', yMin: 0, mtdMonths, months });
      mkLineChart('ch-trend-net', monthLabels, netDatasets, { yFmt: v => v, mtdMonths, months });
      mkLineChart('ch-trend-rate', monthLabels, rateDatasets, { yFmt: v => '€' + fmt(v, 0), yMin: 0, mtdMonths, months });
    }
  });
}

function siteShort(name) {
  if (!name) return '';
  return name.replace(/^1BOX\s+/i, '').replace(/^1Box\s+/i, '');
}

function mkRentalActivityChart(id, labels, miData, moData) {
  // MI/MO grouped bars with "Net: ±N" shown per month (green if positive, red if negative).
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (CHARTS[id]) CHARTS[id].destroy();

  const monthLabels = labels.map(l => l[0]);
  const netLabels = labels.map(l => l[1]);

  CHARTS[id] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: monthLabels,
      datasets: [
        { label: 'Move-Ins', data: miData, backgroundColor: '#16a34a', borderRadius: 2, borderWidth: 0 },
        { label: 'Move-Outs', data: moData, backgroundColor: '#f97316', borderRadius: 2, borderWidth: 0 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { bottom: 20 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y }
        }
      },
      scales: {
        x: {
          ticks: { color: '#6b7280', font: { family: 'Inter', size: 11 } },
          grid: { display: false }
        },
        y: {
          ticks: { color: '#9ca3af', font: { family: 'Inter', size: 10 } },
          grid: { color: '#f3f4f6', drawBorder: false }
        }
      }
    },
    plugins: [{
      id: 'netLabels',
      afterDraw(chart) {
        const x = chart.scales.x;
        if (!x) return;
        const ctx = chart.ctx;
        ctx.save();
        ctx.font = '600 11px Inter';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        x.ticks.forEach((tick, i) => {
          const netStr = netLabels[i];
          if (netStr === undefined || netStr === null || netStr === '') return;
          const isPos = !netStr.startsWith('-') && !netStr.startsWith('−');
          ctx.fillStyle = isPos ? '#16a34a' : '#ef4444';
          const px = x.getPixelForTick(i);
          const py = x.bottom + 4;
          ctx.fillText('Net: ' + netStr, px, py);
        });
        ctx.restore();
      }
    }]
  });
}

function mkHBarChart(id, labels, datasets, fmtFn, maxVal) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (CHARTS[id]) CHARTS[id].destroy();

  // Handle per-bar coloring when data array length differs from dataset count
  const ds = datasets.map(d => ({
    label: d.label,
    data: d.data,
    backgroundColor: Array.isArray(d.color) ? d.color : d.color,
    borderRadius: 3,
    borderWidth: 0
  }));

  const xScale = {
    ticks: {
      color: '#9ca3af',
      font: { family: 'Inter', size: 10 },
      callback: fmtFn ? (v => fmtFn(v)) : undefined
    },
    grid: { color: '#f3f4f6', drawBorder: false }
  };
  if (maxVal !== undefined) xScale.max = maxVal;
  xScale.min = 0;

  CHARTS[id] = new Chart(canvas, {
    type: 'bar',
    data: { labels, datasets: ds },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: {
        legend: {
          display: datasets.length > 1,
          position: 'bottom',
          labels: { color: '#6b7280', font: { family: 'Inter', size: 11 }, boxWidth: 10, padding: 8 }
        }
      },
      scales: {
        x: xScale,
        y: {
          ticks: { color: '#6b7280', font: { family: 'Inter', size: 11 } },
          grid: { display: false }
        }
      }
    }
  });
}

function mkLineChart(id, labels, datasets, opts) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (CHARTS[id]) CHARTS[id].destroy();
  opts = opts || {};

  const yScale = {
    ticks: {
      color: '#9ca3af',
      font: { family: 'Inter', size: 10 },
      callback: v => opts.yFmt ? opts.yFmt(v) : v
    },
    grid: { color: '#f3f4f6', drawBorder: false }
  };
  if (opts.yMin !== undefined) yScale.min = opts.yMin;
  if (opts.yMax !== undefined) yScale.max = opts.yMax;
  if (opts.stepSize) yScale.ticks.stepSize = opts.stepSize;

  const mtdMonths = opts.mtdMonths;
  const months = opts.months || [];

  // Helper: is the data point at this index MTD (current incomplete month)?
  const isMTDIndex = (i) => mtdMonths && months[i] && mtdMonths.has(months[i]);

  const chartDatasets = datasets.map(d => ({
    label: d.label,
    data: d.data,
    borderColor: d.color,
    backgroundColor: 'transparent',
    pointBackgroundColor: (ctx) => isMTDIndex(ctx.dataIndex) ? '#fff' : '#fff',
    pointBorderColor: (ctx) => isMTDIndex(ctx.dataIndex) ? d.color : d.color,
    pointBorderWidth: (ctx) => isMTDIndex(ctx.dataIndex) ? 2 : 2,
    pointRadius: (ctx) => isMTDIndex(ctx.dataIndex) ? 5 : 3,
    pointStyle: (ctx) => isMTDIndex(ctx.dataIndex) ? 'rectRot' : 'circle',
    pointHoverRadius: 6,
    borderWidth: d.lineWidth || 2,
    tension: 0.35,
    spanGaps: true,
    segment: {
      borderDash: (ctx) => {
        // Dash the segment going INTO the MTD point
        if (isMTDIndex(ctx.p1DataIndex)) return [4, 4];
        return undefined;
      }
    }
  }));

  CHARTS[id] = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets: chartDatasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: datasets.length > 1,
          position: 'bottom',
          labels: { color: '#6b7280', font: { family: 'Inter', size: 11 }, boxWidth: 10, padding: 8 }
        },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#e5e7eb',
          borderWidth: 1,
          titleColor: '#1a1a1a',
          bodyColor: '#1a1a1a',
          titleFont: { family: 'Inter', size: 11, weight: '600' },
          bodyFont: { family: 'Inter', size: 11 },
          padding: 10,
          callbacks: {
            title: (items) => {
              if (!items.length) return '';
              const label = items[0].label;
              if (isMTDIndex(items[0].dataIndex)) return label + ' (MTD, incomplete)';
              return label;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#9ca3af', font: { family: 'Inter', size: 10 } },
          grid: { display: false }
        },
        y: yScale
      }
    }
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');

  // Footer data-source attribution varies by tab
  const footer = document.getElementById('page-footer');
  if (footer) {
    const sources = {
      storagepilot: 'Data sourced from StoragePilot',
      siteware: 'Data sourced from SiteWare'
    };
    footer.textContent = sources[name] || 'Data sourced from 1Box MIS Reports';
  }
}

function setStatus(type, msg) {
  const el = document.getElementById('status-banner');
  const sp = document.getElementById('status-spinner');
  const tx = document.getElementById('status-text');
  el.className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
  sp.style.display = type === 'loading' ? 'block' : 'none';
  tx.textContent = msg;
  el.classList.remove('hidden');
}
function hideStatus() { document.getElementById('status-banner').classList.add('hidden'); }
function setProgress(pct) { document.getElementById('loading-bar').style.width = pct + '%'; }
function nextTick(fn) { setTimeout(fn, 50); }

window.addEventListener('load', async () => {
  // Try to load from GitHub (the production deploy)
  const [cached, hist, budgets] = await Promise.all([tryLoadFromGitHub(), tryLoadHistory(), tryLoadBudgets()]);
  if (hist) HISTORY_DATA = hist;
  if (budgets) BUDGET_DATA = budgets;

  // StoragePilot CSVs (best-effort; tab handles missing files gracefully)
  loadStoragePilotData();

  // SiteWare audit CSV (best-effort; tab handles missing file gracefully)
  loadSiteWareData();

  if (cached) {
    IS_DEMO = false;
    RAW_DATA = cached;
    document.getElementById('config-modal').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    renderAll();
    updateLastUpdatedLabel();
    return;
  }

  // If no cached data, check for stored config
  const saved = localStorage.getItem('1box_config');
  if (saved) {
    CONFIG = JSON.parse(saved);
    document.getElementById('cfg-client-id').value = CONFIG.clientId || '';
    document.getElementById('cfg-folder').value = CONFIG.folder || '/1Box MIS Reports';
    document.getElementById('cfg-api-key').value = CONFIG.apiKey || '';
    if (window.location.hash.includes('access_token')) {
      document.getElementById('config-modal').classList.add('hidden');
      document.getElementById('app').classList.add('visible');
      startAuth();
    }
  }

  // Auto-load demo if we're in a preview environment (no data, no config)
  if (!cached && !saved) {
    // Keep modal open, but make demo easy to try
  }
});
